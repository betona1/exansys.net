    font-family:'Inter',system-ui,-apple-system,'Malgun Gothic',sans-serif;
    line-height:1.55;padding:clamp(16px,3.5vw,40px);
  }
  .wrap{max-width:1120px;margin:0 auto}
  .eyebrow{font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:9px}
  h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,4.5vw,36px);font-weight:700;letter-spacing:-.01em;line-height:1.08}
  .sub{color:var(--ink-dim);margin-top:11px;max-width:70ch;font-size:14.5px}

  /* Controls */
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 16px}
  .chip{
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:13px;cursor:pointer;
    background:var(--bg2);border:1px solid var(--line);color:var(--ink-dim);
    padding:7px 15px;border-radius:999px;transition:all .15s;
  }
  .chip:hover{border-color:var(--accent);color:var(--ink)}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#191320;font-weight:600}

  /* Chart */
  .chart-card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:18px;padding:clamp(16px,2.5vw,26px);margin-bottom:20px}
  .chart-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:3px}
  .chart-cap{color:var(--ink-faint);font-size:12.5px;margin-bottom:16px}
  .plot-wrap{position:relative;width:100%}
  .plot{position:relative;width:100%;height:440px;background:
      linear-gradient(var(--line) 1px,transparent 1px) 0 0/100% 25% ,
      linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/25% 100%;
    background-color:rgba(255,255,255,.012);
    border-left:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:6px;}
  .quad-label{position:absolute;font-size:11px;font-family:'Space Grotesk',sans-serif;color:var(--ink-faint);letter-spacing:.04em;pointer-events:none}
  .axis-y{position:absolute;left:-6px;top:50%;transform:rotate(-90deg) translateX(0);transform-origin:left;white-space:nowrap;font-size:11px;color:var(--ink-dim);font-family:'Space Grotesk',sans-serif;letter-spacing:.1em}
  .axis-x{text-align:center;font-size:11px;color:var(--ink-dim);font-family:'Space Grotesk',sans-serif;letter-spacing:.1em;margin-top:8px}
  .dot{position:absolute;border-radius:50%;transform:translate(-50%,50%);cursor:pointer;transition:transform .12s,box-shadow .12s;display:grid;place-items:center;border:2px solid rgba(255,255,255,.14)}
  .dot:hover{transform:translate(-50%,50%) scale(1.14);box-shadow:0 0 0 4px rgba(255,93,143,.18);z-index:5}
  .dot span{font-size:10px;font-weight:600;color:#130e18;font-family:'Space Grotesk',sans-serif;pointer-events:none;white-space:nowrap}
  .dot-name{position:absolute;transform:translate(-50%,-140%);font-size:10.5px;color:var(--ink-dim);white-space:nowrap;pointer-events:none;font-weight:500}

  .legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:20px;font-size:12.5px;color:var(--ink-dim)}
  .legend b{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .legend .sz{color:var(--ink-faint)}

  /* tooltip */
  #tip{position:fixed;pointer-events:none;background:#130e18;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;max-width:240px;opacity:0;transition:opacity .1s;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  #tip h4{font-family:'Space Grotesk',sans-serif;font-size:13.5px;margin-bottom:5px;display:flex;justify-content:space-between;gap:10px}
  #tip .tag{font-size:10px;padding:1px 7px;border-radius:999px;font-weight:600}
  #tip p{color:var(--ink-dim);margin-top:5px;line-height:1.45}

  /* Table */
  .table-card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:18px;padding:clamp(14px,2vw,22px);overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:var(--ink-dim);cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--ink)}
  th .arr{opacity:.4;font-size:10px}
  td.name{font-weight:600;color:var(--ink);white-space:nowrap}
  .flag{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:8px;vertical-align:middle}
  .bar{display:inline-block;height:7px;border-radius:4px;vertical-align:middle;margin-right:7px}
  .fitpill{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:999px;white-space:nowrap;font-family:'Space Grotesk',sans-serif}
  td.note{color:var(--ink-dim);font-size:12.5px;min-width:220px}

  .takeaway{margin-top:22px;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-left:3px solid var(--sweet);border-radius:14px;padding:18px 20px}
  .takeaway h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .takeaway ul{list-style:none;display:grid;gap:9px}
  .takeaway li{font-size:13.5px;color:var(--ink-dim);padding-left:16px;position:relative}
  .takeaway li::before{content:"▸";position:absolute;left:0;color:var(--sweet)}
  .takeaway b{color:var(--ink)}

  footer{margin-top:26px;color:var(--ink-faint);font-size:11.5px;text-align:center;line-height:1.7}
  @media(max-width:640px){
    .plot{height:360px}
    .dot-name{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">App Market Landscape · 2026</div>
  <h1>아시아 · 유럽 앱 시장 비교</h1>
  <p class="sub">17개 시장을 <b>진입 난이도(가로) × 유저 수익성 ARPU(세로)</b>로 배치했습니다. 원 크기는 시장 규모(다운로드·유저 볼륨), 색은 초보 팀 적합도. 오른쪽 위로 갈수록 "진입 쉽고 유저 가치 높은" 이상적 시장이에요. 점에 마우스를 올리면 상세 정보가 나옵니다.</p>

  <div class="controls" id="filters">
    <button class="chip" data-f="all" aria-pressed="true">전체</button>
    <button class="chip" data-f="asia" aria-pressed="false">아시아</button>
    <button class="chip" data-f="europe" aria-pressed="false">유럽</button>
    <button class="chip" data-f="sweet" aria-pressed="false">초보팀 스윗스팟</button>
  </div>

  <div class="chart-card">
    <div class="chart-title">전략 지도 — 어디를 노릴 것인가</div>
    <div class="chart-cap">가로: 진입 쉬움 → / 세로: 유저당 수익 높음 ↑ / 원 크기: 시장 규모</div>
    <div class="plot-wrap">
      <div class="axis-y">유저 수익성 (ARPU) →</div>
      <div class="plot" id="plot">
        <div class="quad-label" style="left:10px;top:10px">고가치 · 진입 어려움</div>
        <div class="quad-label" style="right:10px;top:10px;text-align:right">고가치 · 진입 쉬움 ★</div>
        <div class="quad-label" style="left:10px;bottom:10px">저가치 · 진입 어려움</div>
        <div class="quad-label" style="right:10px;bottom:10px;text-align:right">저가치 · 진입 쉬움 (볼륨)</div>
      </div>
      <div class="axis-x">진입 난이도 (규제·현지화) — 왼쪽=어려움, 오른쪽=쉬움 →</div>
    </div>
    <div class="legend">
      <span><b style="background:var(--sweet)"></b>초보팀 스윗스팟</span>
      <span><b style="background:var(--warn)"></b>가능하나 조건부</span>
      <span><b style="background:var(--asia)"></b>고가치·로컬벽(일·한)</span>
      <span><b style="background:var(--excluded)"></b>제외 권장(중국)</span>
      <span class="sz">● 원 크기 = 시장 규모</span>
    </div>
  </div>

  <div class="table-card">
    <table id="tbl">
      <thead>
        <tr>
          <th data-k="name">시장 <span class="arr">↕</span></th>
          <th data-k="region">지역 <span class="arr">↕</span></th>
          <th data-k="scale">규모 <span class="arr">↕</span></th>
          <th data-k="value">수익성 <span class="arr">↕</span></th>
          <th data-k="entry">진입성 <span class="arr">↕</span></th>
          <th data-k="model">주력 수익모델 <span class="arr">↕</span></th>
          <th data-k="fitv">초보팀 적합도 <span class="arr">↕</span></th>
          <th data-k="note">핵심 특징</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="takeaway">
    <h3>💡 초보 팀 · 수익 목표 기준 정리</h3>
    <ul>
      <li><b>볼륨 플레이(광고):</b> 인도·인도네시아·필리핀·베트남 — 진입 쉽고 규모 크지만 유저당 매출 낮음. 다운로드 볼륨 × 광고로 승부. <b>베트남은 하이퍼캐주얼 수출 세계 1위</b>라 롤모델로 최적.</li>
      <li><b>가치·진입 균형:</b> 대만·싱가포르 — 규제 장벽 없고 결제 의향도 높은 편. 영어·중국어 번체 정도면 커버. <b>초보 팀 스윗스팟.</b></li>
      <li><b>고가치·조건부:</b> 유럽(영국·독일·프랑스·노르딕·스위스) — 유저 가치 최고 수준이지만 GDPR + 경쟁 + 현지화 가격 전략 필요. 앱이 자리 잡은 뒤 확장.</li>
      <li><b>뒤로 미루기:</b> 일본·한국 — ARPU 높지만 애니·MMORPG 로컬 취향과 대형 로컬사 경쟁이 벽.</li>
      <li><b>제외:</b> 중국 — 상업 ICP + 게임 ISBN 판권까지 필요해 외국 초보 팀엔 사실상 불가.</li>
    </ul>
  </div>

  <footer>
    데이터 출처(2025~2026): Sensor Tower, Adjust, AppMagic, Business of Apps, Adapty SOIS 2026, Digital in Asia, Statista, TechCrunch 등 · 수익성·진입성 점수는 여러 출처를 종합한 상대 지표로, 정밀 수치가 아닌 비교용입니다 · 실제 진출 전 최신 데이터·규제 재확인 권장
  </footer>
</div>

<div id="tip"></div>

<script>
(function(){
  // value/entry: 1-5 ; scale: 1-5 (bubble) ; fit: sweet|warn|local|excluded
  const M=[
    {name:"인도",region:"asia",value:1,entry:5,scale:5,model:"광고(볼륨)",fit:"warn",note:"세계 최대 다운로드(연 250억). 지출 <$5/년. AI·숏폼·퍼즐 급성장. 안드로이드 압도."},
    {name:"중국",region:"asia",value:5,entry:1,scale:5,model:"인앱결제",fit:"excluded",note:"세계 1위 시장이나 ICP+ISBN 판권 필수. Google Play 없음, 위챗 미니프로그램. 외국 진입 사실상 불가."},
    {name:"일본",region:"asia",value:5,entry:3,scale:4,model:"인앱결제·가챠",fit:"local",note:"1인당 지출 최고. 게임 편중(출시 앱 73%), 애니·만화 문화. 로컬 개발사 지배."},
    {name:"한국",region:"asia",value:5,entry:3,scale:2,model:"인앱결제·MMORPG",fit:"local",note:"1인당 $143 지출. 네이버·카카오·쿠팡 로컬 생태계. 리니지M류 고과금 지배. 웹툰 강세."},
    {name:"대만",region:"asia",value:3,entry:5,scale:2,model:"인앱결제+광고",fit:"sweet",note:"규제 없음. 소수 고래보다 넓은 중간 결제층. 전략·RPG·캐주얼 강세. 리텐션이 관건."},
    {name:"싱가포르",region:"asia",value:4,entry:5,scale:1,model:"결제·구독",fit:"sweet",note:"규모 작지만 LTV $22(미국↑). 스마트폰 97%. 슈퍼앱 선호, PDPA 준수 필요."},
    {name:"베트남",region:"asia",value:1,entry:4,scale:5,model:"광고→하이브리드",fit:"sweet",note:"게임 수출 세계 1위(구글플레이 67억 다운로드). 국내 ARPU는 낮음. 하이퍼캐주얼 강국. Flappy Bird의 나라."},
    {name:"인도네시아",region:"asia",value:1,entry:5,scale:4,model:"광고(볼륨)",fit:"warn",note:"2억+ 유저, 안드로이드 90%↑. 지출 낮으나 빠른 성장. Gojek·Tokopedia 슈퍼앱."},
    {name:"필리핀",region:"asia",value:1,entry:5,scale:3,model:"광고(볼륨)",fit:"sweet",note:"영어 공용어라 현지화 부담 적음. 소셜커머스·모바일 비중 높음. 설치 성장 +19%."},
    {name:"태국",region:"asia",value:2,entry:4,scale:3,model:"광고·인앱결제",fit:"warn",note:"모바일 비중 높음. 영어 숙련도 낮아 현지화 필수. 지출은 중하위권."},
    {name:"말레이시아",region:"asia",value:3,entry:5,scale:2,model:"혼합",fit:"warn",note:"비교적 성숙한 SEA 시장. 스마트폰 보급 높고 중간 수준 지출. 영어 통용."},
    {name:"영국",region:"europe",value:4,entry:4,scale:3,model:"결제·구독",fit:"warn",note:"유럽 최대 시장(18.1%). 핀테크 강세, 높은 지불 의향. 미국 대비 가격 1.2배. GDPR."},
    {name:"독일",region:"europe",value:4,entry:4,scale:3,model:"결제·구독",fit:"warn",note:"유럽 2위(16.5%). 데스크톱도 강함. 핀테크·스마트홈. 고품질·최신기술 기대치 높음."},
    {name:"프랑스",region:"europe",value:4,entry:4,scale:3,model:"결제·구독",fit:"warn",note:"가장 유망한 성장 시장으로 꼽힘. 스타트업·디지털커머스 활발. ChatGPT 최고 매출."},
    {name:"노르딕",region:"europe",value:5,entry:4,scale:1,model:"결제·프리미엄",fit:"warn",note:"핀·노·덴. 볼륨 적지만 유저 가치 최상급. 소수 고가치 유저 타겟 전략."},
    {name:"이탈리아",region:"europe",value:3,entry:4,scale:2,model:"결제·구독",fit:"warn",note:"모바일 전환 빠름(이미 50%↑). 미국 대비 가격 1.2배. 성장 여력 큼."},
    {name:"스위스",region:"europe",value:5,entry:4,scale:1,model:"결제·구독",fit:"warn",note:"1년 LTV $28.5로 세계 최고. 규모는 작지만 유저당 가치 최상. 프리미엄 포지셔닝."}
  ];

  const colors={sweet:getcss('--sweet'),warn:getcss('--warn'),local:getcss('--asia'),excluded:getcss('--excluded')};
  function getcss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}
  const fitLabel={sweet:"스윗스팟",warn:"조건부",local:"로컬벽",excluded:"제외권장"};
  const fitRank={sweet:3,warn:2,local:1,excluded:0};

  const plot=document.getElementById('plot');
  const tip=document.getElementById('tip');
  let filter='all';

  function visible(m){
    if(filter==='all')return true;
    if(filter==='asia')return m.region==='asia';
    if(filter==='europe')return m.region==='europe';
    if(filter==='sweet')return m.fit==='sweet';
    return true;
  }

  function drawPlot(){
    // clear dots
    plot.querySelectorAll('.dot,.dot-name').forEach(e=>e.remove());
    const W=plot.clientWidth, H=plot.clientHeight, pad=42;
    M.forEach(m=>{
      if(!visible(m))return;
      const x=pad+((m.entry-1)/4)*(W-pad*1.4);
      const y=H-pad-((m.value-1)/4)*(H-pad*1.5);
      const sz=16+m.scale*7;
      const d=document.createElement('div');
      d.className='dot';
      d.style.left=x+'px'; d.style.bottom=(H-y)+'px';
      d.style.width=sz+'px'; d.style.height=sz+'px';
      d.style.background=colors[m.fit];
      if(sz>30){const s=document.createElement('span');s.textContent=m.name;d.appendChild(s);}
      const nm=document.createElement('div');
      nm.className='dot-name';nm.textContent=m.name;
      nm.style.left=x+'px';nm.style.bottom=(H-y)+'px';
      if(sz>30)nm.style.display='none';
      // tooltip
      d.addEventListener('mousemove',e=>{
        tip.style.opacity=1;
        tip.style.left=Math.min(e.clientX+14,window.innerWidth-250)+'px';
        tip.style.top=(e.clientY+14)+'px';
        tip.innerHTML='<h4>'+m.name+'<span class="tag" style="background:'+colors[m.fit]+'33;color:'+colors[m.fit]+'">'+fitLabel[m.fit]+'</span></h4>'+
          '<div style="color:var(--ink-faint);font-size:11px">수익성 '+m.value+'/5 · 진입성 '+m.entry+'/5 · 규모 '+m.scale+'/5 · '+m.model+'</div>'+
          '<p>'+m.note+'</p>';
      });
      d.addEventListener('mouseleave',()=>tip.style.opacity=0);
      plot.appendChild(d);plot.appendChild(nm);
    });
  }

  // table
  let sortK='fitv',sortDir=-1;
  function scaleWord(s){return ['','매우작음','작음','중간','큼','매우큼'][s]}
  function drawTable(){
    const tb=document.getElementById('tbody');tb.innerHTML='';
    const rows=M.filter(visible).slice().sort((a,b)=>{
      let av,bv;
      if(sortK==='fitv'){av=fitRank[a.fit];bv=fitRank[b.fit];}
      else if(sortK==='name'||sortK==='region'||sortK==='model'||sortK==='note'){av=a[sortK];bv=b[sortK];return sortDir*String(av).localeCompare(String(bv),'ko');}
      else{av=a[sortK];bv=b[sortK];}
      return sortDir*(av-bv);
    });
    rows.forEach(m=>{
      const tr=document.createElement('tr');
      const rc=m.region==='asia'?getcss('--asia'):getcss('--europe');
      tr.innerHTML=
        '<td class="name"><span class="flag" style="background:'+rc+'"></span>'+m.name+'</td>'+
        '<td style="color:var(--ink-faint)">'+(m.region==='asia'?'아시아':'유럽')+'</td>'+

    --lang:#5aa9ff;--tool:#4dd4c4;--game:#ff8a6b;--rec:#3ecf8e;
    --e1:#3ecf8e;--e2:#8fd694;--e3:#f5b942;--e4:#ff9d5c;--e5:#f0654a;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1000px 500px at 90% -5%,#2c1f30 0%,transparent 55%),radial-gradient(800px 500px at -5% 105%,#241826 0%,transparent 50%),var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,'Malgun Gothic',sans-serif;line-height:1.55;padding:clamp(16px,3.5vw,40px)}
  .wrap{max-width:1080px;margin:0 auto}
  .eyebrow{font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:9px}
  h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,4.5vw,36px);font-weight:700;letter-spacing:-.01em;line-height:1.08}
  .sub{color:var(--ink-dim);margin-top:11px;max-width:68ch;font-size:14.5px}

  .section-h{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;margin:36px 0 5px;display:flex;align-items:center;gap:10px}
  .section-h .bar{width:5px;height:20px;border-radius:2px}
  .section-cap{color:var(--ink-dim);font-size:13.5px;margin-bottom:16px}

  /* Matrix as cards */
  .matrix{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:720px){.matrix{grid-template-columns:1fr 1fr}}
  .mcard{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:16px 17px}
  .mcard .h{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:11px}
  .mcard .way{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px}
  .mcard .way small{display:block;color:var(--ink-faint);font-size:11.5px;font-weight:400;margin-top:2px}
  .diff{flex:none;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .row{display:flex;gap:8px;font-size:13px;margin-bottom:6px}
  .row .k{color:var(--ink-faint);flex:none;width:52px;font-family:'Space Grotesk',sans-serif;font-size:11.5px;padding-top:1px}
  .row .v{color:var(--ink)}
  .row .v b{color:var(--lang)}
  .mcard .note{margin-top:10px;font-size:12.5px;color:var(--ink-dim);border-top:1px solid var(--line);padding-top:10px}

  /* grouped lists */
  .glist{display:grid;grid-template-columns:1fr;gap:11px}
  @media(min-width:680px){.glist{grid-template-columns:1fr 1fr}}
  .gcard{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .gcard h4{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .gcard h4 .d{width:9px;height:9px;border-radius:50%}
  .item{padding:8px 0;border-top:1px solid var(--line)}
  .item:first-of-type{border-top:none;padding-top:0}
  .item .t{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px}
  .item .t span{color:var(--ink-faint);font-weight:400;font-size:11.5px;margin-left:5px}
  .item .d{color:var(--ink-dim);font-size:12.5px;margin-top:2px}

  .rec{margin-top:16px;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-left:3px solid var(--rec);border-radius:14px;padding:18px 20px}
  .rec h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:11px}
  .rec ul{list-style:none;display:grid;gap:9px}
  .rec li{font-size:13.5px;color:var(--ink-dim);padding-left:16px;position:relative}
  .rec li::before{content:"▸";position:absolute;left:0;color:var(--rec)}
  .rec b{color:var(--ink)}
  .stack{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
  .stack .chip{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;background:var(--bg2);border:1px solid var(--line);color:var(--ink-dim);padding:5px 11px;border-radius:999px}
  .stack .chip b{color:var(--rec)}

  footer{margin-top:34px;color:var(--ink-faint);font-size:12px;text-align:center;line-height:1.7;border-top:1px solid var(--line);padding-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Languages & Tools · Decision Guide</div>
  <h1>앱 개발 언어 & 개발툴 정리</h1>
  <p class="sub">"뭘로 만들지"를 결정하는 관점으로 정리했습니다. 방식별 비교표 → 언어 목록 → 개발툴 목록 → 초보 팀 추천 순서예요. 난이도는 초보 기준 상대 표시(별 많을수록 어려움).</p>

  <!-- 1. Approach matrix -->
  <div class="section-h"><span class="bar" style="background:var(--accent)"></span>무엇으로 앱을 만들까 — 방식 비교</div>
  <div class="section-cap">앱을 만드는 6가지 길. 언어·툴·난이도·추천 상황을 한눈에.</div>
  <div class="matrix">

    <div class="mcard">
      <div class="h"><div class="way">네이티브 안드로이드<small>안드로이드 전용, 성능 최상</small></div><span class="diff" style="background:rgba(245,185,66,.15);color:var(--e3)">난이도 ★★★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>Kotlin</b> (또는 Java)</span></div>
      <div class="row"><span class="k">핵심 툴</span><span class="v">Android Studio · Gradle · 에뮬레이터</span></div>
      <div class="row"><span class="k">배포</span><span class="v">구글 플레이 (AAB)</span></div>
      <div class="note">✅ 맥 없이 개발 가능. 안드로이드 성능·기능 100% 활용. ❌ iOS는 따로 만들어야 함.</div>
    </div>

    <div class="mcard">
      <div class="h"><div class="way">네이티브 iOS<small>애플 전용</small></div><span class="diff" style="background:rgba(240,101,74,.15);color:var(--e5)">난이도 ★★★★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>Swift</b> (또는 Objective-C)</span></div>
      <div class="row"><span class="k">핵심 툴</span><span class="v">Xcode (macOS 전용) · 시뮬레이터</span></div>
      <div class="row"><span class="k">배포</span><span class="v">앱스토어 ($99/년)</span></div>
      <div class="note">❗ <b>맥 컴퓨터 필수.</b> 초보 팀 첫 앱으로는 부담이 큼. 안드로이드 검증 후 확장 권장.</div>
    </div>

    <div class="mcard">
      <div class="h"><div class="way">Flutter<small>크로스플랫폼</small></div><span class="diff" style="background:rgba(245,185,66,.15);color:var(--e3)">난이도 ★★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>Dart</b></span></div>
      <div class="row"><span class="k">핵심 툴</span><span class="v">Flutter SDK · VS Code / Android Studio</span></div>
      <div class="row"><span class="k">배포</span><span class="v">iOS + 안드로이드 (한 코드)</span></div>
      <div class="note">✅ 한 번 짜서 양 OS. UI가 예쁘고 빠름. 구글이 밀고 있어 자료 풍부. 초보 크로스플랫폼 1순위.</div>
    </div>

    <div class="mcard">
      <div class="h"><div class="way">React Native<small>크로스플랫폼</small></div><span class="diff" style="background:rgba(245,185,66,.15);color:var(--e3)">난이도 ★★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>JavaScript / TypeScript</b></span></div>
      <div class="row"><span class="k">핵심 툴</span><span class="v">VS Code · Expo · Node.js</span></div>
      <div class="row"><span class="k">배포</span><span class="v">iOS + 안드로이드 (한 코드)</span></div>
      <div class="note">✅ 웹(JS) 지식 그대로 재활용. 메타·커뮤니티 거대. 웹 배경 있으면 Flutter보다 친숙.</div>
    </div>

    <div class="mcard">
      <div class="h"><div class="way">웹앱 / PWA<small>브라우저 기반</small></div><span class="diff" style="background:rgba(62,207,142,.15);color:var(--e1)">난이도 ★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>HTML · CSS · JavaScript</b></span></div>
      <div class="row"><span class="k">핵심 툴</span><span class="v">VS Code · 브라우저 · (Firebase Hosting)</span></div>
      <div class="row"><span class="k">배포</span><span class="v">URL 링크 · PWA는 설치도 가능</span></div>
      <div class="note">✅ <b>가장 쉬움.</b> 스토어 심사·빌드 지옥 없음. 결과가 즉시 보여 초보 동기부여 최고. 첫 실습에 이상적.</div>
    </div>

    <div class="mcard">
      <div class="h"><div class="way">파이썬 계열<small>Python 유지</small></div><span class="diff" style="background:rgba(245,185,66,.15);color:var(--e3)">난이도 ★★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>Python</b></span></div>
      <div class="row"><span class="k">핵심 툴</span><span class="v">Kivy · BeeWare · Flet · Streamlit(웹)</span></div>
      <div class="row"><span class="k">배포</span><span class="v">가능하나 모바일 생태계 약함</span></div>
      <div class="note">✅ Python 강점 유지. ❌ 모바일 UI 생태계·자료가 빈약. <b>백엔드·자동화·웹앱엔 최고, 본격 모바일엔 비주력.</b></div>
    </div>

  </div>

  <!-- 2. Game engines -->
  <div class="section-h"><span class="bar" style="background:var(--game)"></span>게임을 만든다면 — 게임 엔진</div>
  <div class="section-cap">하이퍼캐주얼 등 게임은 일반 앱 프레임워크보다 전용 엔진이 유리합니다.</div>
  <div class="matrix">
    <div class="mcard">
      <div class="h"><div class="way">Unity<small>2D·3D 게임 표준</small></div><span class="diff" style="background:rgba(245,185,66,.15);color:var(--e3)">난이도 ★★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>C#</b></span></div>
      <div class="row"><span class="k">특징</span><span class="v">하이퍼캐주얼·모바일 게임 점유율 최상. 광고 SDK 연동 쉬움.</span></div>
      <div class="note">수익형 캐주얼 게임을 진지하게 노린다면 사실상 1순위. 자료·에셋이 압도적.</div>
    </div>
    <div class="mcard">
      <div class="h"><div class="way">Godot<small>무료·오픈소스</small></div><span class="diff" style="background:rgba(62,207,142,.15);color:var(--e1)">난이도 ★★</span></div>
      <div class="row"><span class="k">언어</span><span class="v"><b>GDScript</b> (Python 유사) / C#</span></div>
      <div class="row"><span class="k">특징</span><span class="v">가볍고 무료. 2D에 강함. GDScript가 파이썬 닮아 초보·Python 유저에 친숙.</span></div>
      <div class="note">Python 하시는 분께 진입 장벽이 낮음. 2D 캐주얼 게임 학습용으로 훌륭.</div>
    </div>
  </div>

  <!-- 3. Languages -->
  <div class="section-h"><span class="bar" style="background:var(--lang)"></span>언어 정리 — 용도별</div>
  <div class="section-cap">각 언어가 실제로 어디에 쓰이는지 기준으로 묶었습니다.</div>
  <div class="glist">
    <div class="gcard">
      <h4><span class="d" style="background:var(--lang)"></span>모바일 네이티브</h4>
      <div class="item"><div class="t">Kotlin <span>안드로이드 공식</span></div><div class="d">현재 안드로이드 네이티브의 표준. 간결·안전.</div></div>
      <div class="item"><div class="t">Swift <span>iOS 공식</span></div><div class="d">애플 앱의 현대 표준 언어. Xcode·맥 필요.</div></div>
      <div class="item"><div class="t">Java <span>안드로이드 전통</span></div><div class="d">옛 안드로이드·기업용에 여전히 많음.</div></div>
      <div class="item"><div class="t">Objective-C <span>iOS 전통</span></div><div class="d">Swift 이전 애플 언어. 레거시에서 만남.</div></div>
    </div>
    <div class="gcard">
      <h4><span class="d" style="background:var(--rec)"></span>크로스플랫폼</h4>
      <div class="item"><div class="t">Dart <span>Flutter</span></div><div class="d">한 코드로 iOS·안드로이드·웹. 배우기 쉬운 편.</div></div>
      <div class="item"><div class="t">JavaScript <span>React Native·웹</span></div><div class="d">웹·앱을 아우르는 만능 언어. 커뮤니티 최대.</div></div>
      <div class="item"><div class="t">TypeScript <span>JS + 타입</span></div><div class="d">JS에 안전장치를 더한 것. 큰 프로젝트 필수급.</div></div>
      <div class="item"><div class="t">C# <span>Unity 게임</span></div><div class="d">게임 엔진 Unity의 언어. 게임 개발이면 핵심.</div></div>
    </div>
    <div class="gcard">
      <h4><span class="d" style="background:var(--e3)"></span>웹 (프론트엔드)</h4>
      <div class="item"><div class="t">HTML</div><div class="d">화면의 뼈대(구조).</div></div>
      <div class="item"><div class="t">CSS</div><div class="d">화면의 겉모습(색·배치).</div></div>
      <div class="item"><div class="t">JavaScript</div><div class="d">화면에 동작·상호작용 부여. 웹의 필수 3종.</div></div>
    </div>
    <div class="gcard">
      <h4><span class="d" style="background:var(--tool)"></span>백엔드·범용·데이터</h4>
      <div class="item"><div class="t">Python <span>백엔드·AI·자동화</span></div><div class="d">배우기 쉽고 활용처 넓음. 서버·데이터·AI에 강함.</div></div>
      <div class="item"><div class="t">SQL <span>데이터베이스</span></div><div class="d">데이터 저장·조회의 공용 질의 언어.</div></div>
      <div class="item"><div class="t">Node.js(JS) <span>서버</span></div><div class="d">자바스크립트로 서버를 만드는 환경.</div></div>
    </div>
  </div>

  <!-- 4. Tools -->
  <div class="section-h"><span class="bar" style="background:var(--tool)"></span>개발툴 정리 — 역할별</div>
  <div class="section-cap">개발 과정 단계별로 어떤 도구가 필요한지.</div>
  <div class="glist">
    <div class="gcard">
      <h4><span class="d" style="background:var(--tool)"></span>코드 작성 (에디터·IDE)</h4>
      <div class="item"><div class="t">VS Code</div><div class="d">가장 널리 쓰는 만능 에디터. 웹·Flutter·RN·Python 다 커버. 초보 1순위.</div></div>
      <div class="item"><div class="t">Android Studio</div><div class="d">안드로이드 네이티브 공식 IDE. 빌드·에뮬레이터 포함.</div></div>
      <div class="item"><div class="t">Xcode</div><div class="d">애플 앱 공식 IDE. macOS 전용.</div></div>
      <div class="item"><div class="t">Claude Code <span>AI 코딩</span></div><div class="d">명령으로 코드를 읽고 쓰고 고치는 AI 도구. 위 에디터와 함께 씀.</div></div>
    </div>
    <div class="gcard">
      <h4><span class="d" style="background:var(--e3)"></span>빌드·실행·테스트</h4>
      <div class="item"><div class="t">Gradle</div><div class="d">안드로이드 앱을 조립·빌드하는 도구.</div></div>
      <div class="item"><div class="t">에뮬레이터 / 시뮬레이터</div><div class="d">PC에서 가상 폰으로 앱 테스트.</div></div>
      <div class="item"><div class="t">ADB</div><div class="d">PC↔안드로이드 기기 연결·디버깅.</div></div>
      <div class="item"><div class="t">실기기 테스트</div><div class="d">실제 폰에 설치해 최종 확인.</div></div>
    </div>
    <div class="gcard">
      <h4><span class="d" style="background:var(--rec)"></span>백엔드·데이터 (BaaS)</h4>
      <div class="item"><div class="t">Firebase</div><div class="d">서버 없이 로그인·DB·알림·분석. 초보 강력 추천.</div></div>
      <div class="item"><div class="t">Supabase</div><div class="d">Firebase 대안(오픈소스, SQL 기반).</div></div>
      <div class="item"><div class="t">FastAPI / Django <span>Python</span></div><div class="d">Python으로 직접 서버를 만들 때.</div></div>
    </div>
    <div class="gcard">
      <h4><span class="d" style="background:var(--lang)"></span>협업·배포</h4>
      <div class="item"><div class="t">Git / GitHub</div><div class="d">코드 이력 관리·백업·협업. 팀 개발 필수.</div></div>
      <div class="item"><div class="t">Google Play Console</div><div class="d">안드로이드 앱 등록·배포·관리.</div></div>
      <div class="item"><div class="t">App Store Connect</div><div class="d">iOS 앱 등록·배포 (맥·애플 계정 필요).</div></div>
    </div>
  </div>

  <!-- 5. Recommendation -->
  <div class="section-h"><span class="bar" style="background:var(--rec)"></span>초보 4명 팀 추천 (수익형 앱 · 안드로이드 우선)</div>
  <div class="rec">
    <h3>💡 이렇게 시작하는 걸 추천해요</h3>
    <ul>

function show(id){ frame.srcdoc = TOOLS[id]; [...tabs.children].forEach(b=>b.setAttribute('aria-selected', b.dataset.tab===id)); }
tabs.addEventListener('click', e=>{ const b=e.target.closest('.tab'); if(!b) return; show(b.dataset.tab); });
show("plan");
</script>
</body>
