<html lang="ko">
<head>
<meta charset="utf-8"/>

<title>AI · 앱 개발 용어집</title>
<style>
  :root{--paper:#F6F7FA;--card:#fff;--ink:#12141C;--muted:#5B6472;--line:#E7EAF0;

  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);

  .wrap{max-width:1120px;margin:0 auto;padding:0 20px}
  .hero{background:radial-gradient(900px 300px at 85% -20%,rgba(155,225,93,.25),transparent 60%),
    linear-gradient(160deg,#0E5741,#0b3f30);color:#fff;border-radius:0 0 28px 28px}
  .hero .wrap{padding:48px 20px 40px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;opacity:.9;font-size:14px}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--lime),#4bd08a);
    display:grid;place-items:center;color:#0b3f30}
  .hero h1{font-size:clamp(28px,5vw,46px);font-weight:900;letter-spacing:-.02em;margin:18px 0 8px}
  .hero p{margin:0;color:#dff3e8;font-weight:600;font-size:16px}
  .hero .count{font-family:"Bricolage Grotesque",sans-serif;color:var(--lime)}
  .bar{position:sticky;top:0;z-index:20;background:rgba(246,247,250,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 0}
  #q{width:100%;border:1px solid var(--line);background:#fff;border-radius:999px;padding:13px 20px;
    font-size:15px;outline:none;box-shadow:var(--shadow)}
  #q:focus{border-color:var(--green)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;
    font-weight:700;cursor:pointer;color:var(--muted);transition:.12s;white-space:nowrap}
  .chip:hover{border-color:var(--ink);color:var(--ink)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .c{opacity:.6;margin-left:4px;font-size:11px}
  #meta{color:var(--muted);font-size:13px;font-weight:600;margin:18px 0 12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding-bottom:60px}
  .term{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;
    box-shadow:var(--shadow);display:flex;flex-direction:column}
  .term .badge{align-self:flex-start;font-size:11px;font-weight:800;color:#fff;padding:3px 9px;border-radius:999px;margin-bottom:8px}
  .term h3{margin:0;font-size:17px;font-weight:800}
  .term .en{color:var(--muted);font-size:12.5px;font-weight:600;margin:1px 0 8px}
  .term .def{font-size:14px;color:#2b2f3a;font-weight:500}
  .term .def b{color:var(--green)}
  .term .tip{margin-top:10px;background:#f2f9f4;border:1px solid #d5ecdd;border-radius:12px;padding:9px 12px;
    font-size:12.5px;font-weight:600;color:#276749}
  .term .tip b{color:var(--green)}
  .empty{text-align:center;color:var(--muted);padding:60px 0;font-weight:600}
  mark{background:var(--lime);color:inherit;padding:0 1px;border-radius:3px}
  footer{text-align:center;color:var(--muted);font-size:13px;font-weight:600;padding:24px 0 44px}
</style>
</head>
<body>
<header class="hero"><div class="wrap">
  <div class="brand"><span class="dot">🐍</span> EXANSYS · AI 교육</div>
  <h1>AI · 앱 개발 용어집</h1>
  <p>클로드코드로 앱을 만들 때 만나는 필수 용어 <span class="count" id="total">0</span>개 — 검색하거나 분류를 눌러 찾으세요.</p>
</div></header>

<div class="bar"><div class="wrap">
  <input id="q" type="search" placeholder="용어 검색…  (예: 커밋, API, 터미널, 환각, WSL)" autocomplete="off"/>
  <div class="chips" id="chips"></div>
</div></div>

<main class="wrap">
  <div id="meta"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">검색 결과가 없습니다.</div>
</main>
<footer>EXANSYS Co., Ltd. · AI·앱 개발 용어집</footer>

>이에요."}, {"cat": "type", "term": "MySQL / PostgreSQL", "en": "서버 RDB", "def": "서버에서 돌아가는 대표 관계형 DB. Postgres가 기능이 풍부해 요즘 인기.", "tip": null}, {"cat": "type", "term": "MongoDB", "en": "몽고DB", "def": "문서(JSON 유사) 형태로 저장하는 대표 NoSQL. 구조 변경이 자유로움.", "tip": null}, {"cat": "type", "term": "Firebase Firestore", "en": "파이어스토어", "def": "구글의 앱용 클라우드 NoSQL DB. 실시간 동기화·서버 불필요.", "tip": "초보 앱에서 로그인·저장을 가장 쉽게 붙이는 방법. 강력 추천."}, {"cat": "type", "term": "Redis", "en": "레디스", "def": "메모리에 저장해 매우 빠른 인메모리 DB. 주로 캐시·세션에 사용.", "tip": null}, {"cat": "type", "term": "Supabase", "en": "수파베이스", "def": "Firebase 대안. PostgreSQL(SQL) 기반 오픈소스 백엔드.", "tip": null}, {"cat": "struct", "term": "테이블", "en": "table", "def": "관계형 DB에서 데이터를 담는 표. 엑셀 시트를 떠올리면 쉬움.", "tip": null}, {"cat": "struct", "term": "레코드 / 행", "en": "record/row", "def": "테이블의 한 줄. 데이터 하나(예: 회원 1명)를 나타냄.", "tip": null}, {"cat": "struct", "term": "필드 / 열", "en": "field/column", "def": "테이블의 한 칸 종류(예: 이름·이메일·나이).", "tip": null}, {"cat": "struct", "term": "기본키", "en": "Primary Key", "def": "각 레코드를 유일하게 구분하는 값(예: 회원 ID). 중복 불가.", "tip": "모든 테이블의 필수 요소. '이 데이터가 누구인지' 식별하는 열쇠."}, {"cat": "struct", "term": "외래키", "en": "Foreign Key", "def": "다른 테이블의 기본키를 참조해 두 테이블을 연결하는 값.", "tip": null}, {"cat": "struct", "term": "인덱스", "en": "index", "def": "검색을 빠르게 해주는 색인. 책 뒤 '찾아보기'와 같은 역할.", "tip": "자주 검색하는 열에 걸면 속도가 확 빨라집니다."}, {"cat": "struct", "term": "관계", "en": "relationship", "def": "테이블 간 연결 방식. 1:1, 1:다(1:N), 다:다(N:M).", "tip": null}, {"cat": "ops", "term": "SELECT / INSERT / UPDATE / DELETE", "en": "SQL 명령", "def": "각각 조회·추가·수정·삭제하는 SQL 기본 명령어.", "tip": null}, {"cat": "ops", "term": "WHERE / ORDER BY", "en": "조건·정렬", "def": "조건으로 거르고(WHERE) 순서대로 정렬(ORDER BY)하는 구문.", "tip": null}, {"cat": "ops", "term": "JOIN", "en": "조인", "def": "여러 테이블을 연결해 함께 조회하는 것. 관계형 DB의 핵심 기능.", "tip": "예: 주문 테이블 + 회원 테이블을 합쳐 '누가 뭘 샀는지' 조회."}, {"cat": "ops", "term": "트랜잭션", "en": "transaction", "def": "여러 작업을 하나로 묶어 '전부 성공 또는 전부 취소'로 처리하는 단위.", "tip": "예: 계좌 이체(출금+입금)는 둘 다 되거나 둘 다 안 돼야 함."}, {"cat": "ops", "term": "커밋 / 롤백", "en": "commit/rollback", "def": "트랜잭션을 확정(commit)하거나 되돌리는(rollback) 것.", "tip": null}, {"cat": "run", "term": "정규화", "en": "normalization", "def": "데이터 중복을 줄이도록 테이블을 잘 나누는 설계 원칙.", "tip": null}, {"cat": "run", "term": "백업 / 복원", "en": "backup", "def": "데이터 손실에 대비해 복사본을 저장하고 되살리는 것.", "tip": null}, {"cat": "run", "term": "복제", "en": "replication", "def": "DB를 여러 대에 복사해두는 것. 장애 대비·부하 분산.", "tip": "규모가 커진 뒤 신경 쓰는 심화 개념. 초보 첫 앱엔 불필요."}, {"cat": "run", "term": "샤딩", "en": "sharding", "def": "데이터를 여러 DB로 쪼개 저장해 대용량을 감당하는 기법(심화).", "tip": null}, {"cat": "app", "term": "ORM", "en": "객체-관계 매핑", "def": "코드의 객체와 DB 테이블을 자동으로 연결해주는 도구. SQL을 덜 쓰게 해줌.", "tip": "예: Python의 Django ORM. 초보가 DB를 코드로 다루기 쉽게 해줍니다."}, {"cat": "app", "term": "ACID", "en": "에이시드", "def": "믿을 수 있는 트랜잭션의 4원칙(원자성·일관성·고립성·지속성).", "tip": null}, {"cat": "app", "term": "문서 / 컬렉션", "en": "document/collection", "def": "NoSQL(Firestore·MongoDB)의 저장 단위. 문서=데이터 하나, 컬렉션=문서 묶음.", "tip": null}, {"cat": "app", "term": "커넥션 / 커넥션 풀", "en": "connection", "def": "앱이 DB에 연결하는 통로. 여러 연결을 재사용하는 게 커넥션 풀.", "tip": null}, {"cat": "app", "term": "N+1 문제", "en": "N+1 problem", "def": "쿼리를 비효율적으로 여러 번 날려 느려지는 흔한 실수(심화).", "tip": "JOIN이나 일괄 조회로 해결. 앱이 느릴 때 자주 범인이에요."}];
const CATS = {"env": {"label": "환경·터미널", "color": "#0E5741"}, "ai": {"label": "AI·클로드코드", "color": "#5a4fd0"}, "prog": {"label": "프로그래밍 기초", "color": "#3A6EA5"}, "lang": {"label": "개발 언어", "color": "#147a5c"}, "web": {"label": "웹·언어·API", "color": "#2b8a9e"}, "app": {"label": "앱 아키텍처", "color": "#b7791f"}, "data": {"label": "데이터 기본", "color": "#c2410c"}, "type": {"label": "DB 종류", "color": "#9d5b0a"}, "struct": {"label": "DB 구조", "color": "#7c6f00"}, "run": {"label": "DB 운영", "color": "#6b7280"}, "fb": {"label": "파이어베이스·구글", "color": "#d97706"}, "fw": {"label": "앱 프레임워크", "color": "#7c3aed"}, "tool": {"label": "개발 도구", "color": "#4f6b8a"}, "git": {"label": "깃·버전관리", "color": "#111827"}, "ops": {"label": "배포·운영·SQL", "color": "#0f766e"}, "store": {"label": "스토어 출시", "color": "#be185d"}, "money": {"label": "수익화", "color": "#15803d"}, "role": {"label": "개발 직무", "color": "#7e22ce"}};
const ORDER = ["env", "ai", "prog", "lang", "web", "app", "fw", "data", "type", "struct", "run", "fb", "tool", "git", "ops", "store", "money", "role"];
let active = "all", query = "";
document.getElementById('total').textContent = TERMS.length;

const counts = {};
TERMS.forEach(t => counts[t.cat] = (counts[t.cat]||0)+1);

const chips = document.getElementById('chips');
function chip(id, label, n, color){
  const b = document.createElement('button');
  b.className = 'chip' + (id===active?' on':'');
  b.innerHTML = label + '<span class="c">' + n + '</span>';
  if(color && id!=='all'){ b.style.borderLeft = '4px solid '+color; }
  b.onclick = () => { active = id; render(); [...chips.children].forEach(c=>c.classList.remove('on')); b.classList.add('on'); };
  chips.appendChild(b);
}
chip('all','전체',TERMS.length,null);
ORDER.forEach(c => { if(counts[c]) chip(c, CATS[c].label, counts[c], CATS[c].color); });

function esc(s){ return (s||'').replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function hl(html, q){
  if(!q) return html;
  // highlight in text nodes only (avoid breaking <b> tags): simple approach on plain segments
  return html.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'), '<mark>$1</mark>');
}

const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const meta = document.getElementById('meta');

function render(){
  const q = query.trim().toLowerCase();
  const list = TERMS.filter(t => {
    if(active!=='all' && t.cat!==active) return false;
    if(!q) return true;
    return (t.term+' '+(t.en||'')+' '+t.def).toLowerCase().includes(q);
  });
  meta.textContent = (active==='all'?'전체':CATS[active].label) + ' · ' + list.length + '개';
  grid.innerHTML = '';
  list.forEach(t => {
    const cat = CATS[t.cat] || {label:t.cat,color:'#666'};
    const el = document.createElement('div');
    el.className = 'term';
    el.innerHTML =
      '<span class="badge" style="background:'+cat.color+'">'+esc(cat.label)+'</span>'+
      '<h3>'+hl(esc(t.term),query)+'</h3>'+
      (t.en?'<div class="en">'+hl(esc(t.en),query)+'</div>':'')+
      '<div class="def">'+t.def+'</div>'+
      (t.tip?'<div class="tip">💡 '+t.tip+'</div>':'');
    grid.appendChild(el);
  });
  empty.style.display = list.length? 'none':'block';
  grid.style.display = list.length? 'grid':'none';
}
document.getElementById('q').addEventListener('input', e => { query = e.target.value; render(); });
render();
</script>
</body>
</html>
