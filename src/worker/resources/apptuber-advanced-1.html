<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앱튜버 심화 과정1 · 안드로이드 앱 개발 실무</title>
<style>
:root{
  --bg:#0b1020;
  --bg2:#111834;
  --panel:#161f42;
  --panel2:#1d2a55;
  --line:#2a396b;
  --txt:#e8ecff;
  --muted:#9fb0e0;
  --accent:#42e6c8;
  --accent2:#6c8cff;
  --accent3:#ff7ad9;
  --warn:#ffcf5c;
  --danger:#ff6b7a;
  --ok:#5be59a;
  --anim-mult:1;           /* 애니메이션 속도 배율(슬라이더로 수정 가능) */
  --shadow:0 20px 60px rgba(0,0,0,.45);
  font-synthesis:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(1200px 800px at 80% -10%,#1a2350 0%,transparent 60%),
             radial-gradient(1000px 700px at -10% 110%,#241844 0%,transparent 55%),
             var(--bg);
  color:var(--txt);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,-apple-system,sans-serif;
  overflow:hidden;
  line-height:1.6;
  letter-spacing:-.2px;
}

/* ===== 슬라이드 무대 ===== */
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:56px 72px 90px;}
.slide{
  position:absolute;inset:0;
  display:none;
  flex-direction:column;
  padding:56px 72px 96px;
  opacity:0;
  transform:translateY(18px) scale(.99);
  transition:opacity .5s ease, transform .5s ease;
  overflow:auto;
}
.slide.active{display:flex;opacity:1;transform:none;}
.slide::-webkit-scrollbar{width:8px}
.slide::-webkit-scrollbar-thumb{background:#2a396b;border-radius:8px}

/* 챕터 표지 */
.cover{align-items:flex-start;justify-content:center}
.kicker{display:inline-flex;align-items:center;gap:10px;font-size:15px;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:18px}
.kicker::before{content:"";width:34px;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.slide h1{font-size:64px;font-weight:800;line-height:1.08;letter-spacing:-1.5px;margin-bottom:18px}
.slide h2{font-size:40px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.slide h3{font-size:22px;font-weight:700;color:var(--accent);margin:6px 0 14px}
.lead{font-size:20px;color:var(--muted);max-width:900px}
.slide p{font-size:18px;color:#d4dcff}
.slidehead{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid #24336a;padding-bottom:16px;margin-bottom:26px}
.slidehead .cnum{font-size:14px;font-weight:800;color:var(--accent2);background:#18265a;background:#18265a;
  padding:6px 12px;border-radius:999px;white-space:nowrap}
.slidehead h2{font-size:34px;margin:0}
.body{flex:1;display:flex;flex-direction:column;gap:20px}

/* 카드/그리드 */
.grid{display:grid;gap:20px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:repeat(4,1fr)}
.card{
  background:linear-gradient(180deg,rgba(29,42,85,.9),rgba(22,31,66,.9));
  border:1px solid #26366e;border-radius:18px;padding:22px 22px;box-shadow:var(--shadow);
}
.card h4{font-size:19px;margin-bottom:8px;display:flex;align-items:center;gap:9px}
.card p, .card li{font-size:16.5px;color:#cdd7ff}
.card .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px;
  background:linear-gradient(135deg,var(--accent2),var(--accent3));flex:none}
ul.clean{list-style:none;display:flex;flex-direction:column;gap:9px}
ul.clean li{padding-left:22px;position:relative}
ul.clean li::before{content:"▸";position:absolute;left:0;color:var(--accent);font-weight:800}
.pill{display:inline-block;padding:5px 12px;border-radius:999px;font-size:13.5px;font-weight:700;
  background:#1c2b5e;color:var(--accent);border:1px solid #2c4088;margin:3px 3px 0 0}
.tag-front{background:#20264f;color:#8fa6ff;border-color:#39468f}
.tag-back{background:#1b3340;color:#57e0c4;border-color:#2b6b62}

/* 코드블럭 */
pre{background:#080d1f;border:1px solid #223066;border-radius:14px;padding:18px 20px;overflow:auto;
  font-family:"JetBrains Mono","SF Mono",ui-monospace,Consolas,monospace;font-size:15px;line-height:1.7;color:#d8e2ff}
pre .k{color:#ff9ecb}.pre .s{color:#9be7a1}
code.k{color:#ff9ecb}code.s{color:#7fe3a6}code.c{color:#7f8fc7}code.n{color:#ffd479}
.mono{font-family:"JetBrains Mono","SF Mono",ui-monospace,Consolas,monospace}

/* ===== 용어 툴팁 (마우스 롤오버) ===== */
.term{
  position:relative;color:var(--accent);font-weight:700;cursor:help;
  border-bottom:2px dotted rgba(66,230,200,.6);
}
.term:hover{color:#fff;background:rgba(66,230,200,.14);border-radius:4px}
.term .tip{
  position:absolute;left:50%;bottom:calc(100% + 12px);transform:translateX(-50%) translateY(6px);
  width:320px;max-width:44vw;background:#0c1330;border:1px solid var(--accent);
  border-radius:12px;padding:13px 15px;font-size:14.5px;font-weight:500;color:#e7ecff;line-height:1.55;
  box-shadow:0 18px 40px rgba(0,0,0,.55);opacity:0;visibility:hidden;transition:.22s ease;z-index:60;
  pointer-events:none;letter-spacing:-.2px;
}
.term .tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:var(--accent)}
.term .tip b{color:var(--accent)}
.term:hover .tip{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.term .tip.right{left:0;transform:translateX(-10%) translateY(6px)}
.term:hover .tip.right{transform:translateX(-10%)}

/* ===== 애니메이션 차트 ===== */
.chart{display:flex;flex-direction:column;gap:14px}
.bar-row{display:grid;grid-template-columns:150px 1fr 64px;align-items:center;gap:14px}
.bar-label{font-size:15.5px;color:#cfd8ff;font-weight:600;text-align:right}
.bar-track{height:26px;background:#0d1533;border:1px solid #223066;border-radius:8px;overflow:hidden;position:relative}
.bar-fill{height:100%;width:0;border-radius:7px;
  transition:width calc(1.2s * var(--anim-mult)) cubic-bezier(.22,1,.36,1);
  background:linear-gradient(90deg,var(--accent2),var(--accent));}
.slide.active .bar-fill.in{width:var(--w)}
.bar-val{font-size:15px;font-weight:800;color:var(--accent);text-align:left}

/* 흐름 다이어그램 노드 */
.flow{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.node{background:linear-gradient(180deg,#20305f,#18265a);background:linear-gradient(180deg,#20305f,#16234f);
  border:1px solid #33478f;border-radius:14px;padding:16px 20px;text-align:center;min-width:150px;
  opacity:0;transform:translateY(14px);transition:all calc(.5s * var(--anim-mult)) ease;}
.slide.active .node.in{opacity:1;transform:none}
.node .t{font-weight:800;font-size:17px}
.node .d{font-size:13.5px;color:var(--muted);margin-top:4px}
.arrow{font-size:26px;color:var(--accent);opacity:0;transition:all calc(.5s * var(--anim-mult)) ease}
.slide.active .arrow.in{opacity:1}

/* MVC / 라이프사이클 특수 */
.mvc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:stretch}
.mvc .card{text-align:center;opacity:0;transform:scale(.92);transition:all calc(.55s*var(--anim-mult)) cubic-bezier(.22,1,.36,1)}
.slide.active .mvc .card.in{opacity:1;transform:none}
.mvc .big{font-size:40px}
.cycle{display:flex;flex-direction:column;gap:10px;max-width:520px;margin:0 auto}
.life{display:flex;align-items:center;gap:14px;background:#141d40;border:1px solid #26366e;border-radius:12px;
  padding:12px 16px;opacity:0;transform:translateX(-16px);transition:all calc(.5s*var(--anim-mult)) ease}
.slide.active .life.in{opacity:1;transform:none}
.life .m{font-family:"JetBrains Mono",monospace;color:var(--accent);font-weight:800;font-size:16px;min-width:130px}
.life .x{font-size:14.5px;color:#cbd5ff}

/* 폰 목업 & 제스처 데모 */
.phone{width:230px;height:470px;border-radius:34px;background:#0a1130;border:6px solid #2a3a72;
  box-shadow:var(--shadow);position:relative;overflow:hidden;flex:none}
.phone .status{height:30px;background:#0c1533;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#7f8fc7}
.phone .screen{position:absolute;inset:30px 0 0 0;padding:14px}
.demo-card{background:linear-gradient(135deg,var(--accent2),var(--accent3));border-radius:14px;padding:16px;
  color:#fff;font-weight:700;cursor:grab;user-select:none;transition:transform .15s ease, opacity .2s}
.fab{position:absolute;right:16px;bottom:20px;width:56px;height:56px;border-radius:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;
  font-size:26px;color:#04121a;font-weight:800;box-shadow:0 10px 24px rgba(66,230,200,.4);cursor:pointer;
  transition:transform .2s}
.fab:active{transform:scale(.9) rotate(90deg)}
.drawer{position:absolute;inset:0 40% 0 0;background:#0e1631;border-right:1px solid #2a3a72;
  transform:translateX(-105%);transition:transform .35s cubic-bezier(.22,1,.36,1);padding:16px;z-index:5}
.drawer.open{transform:none}
.drawer .di{padding:11px 8px;border-bottom:1px solid #1e2b57;font-size:14px;color:#cdd7ff}
.burger{cursor:pointer;font-size:22px;padding:4px 8px;color:var(--accent)}

/* 비교 테이블 */
table.cmp{width:100%;border-collapse:collapse;font-size:16px}
table.cmp th,table.cmp td{border:1px solid #26366e;padding:12px 14px;text-align:left}
table.cmp th{background:#18265a;background:#172550;color:var(--accent);font-weight:800}
table.cmp tr:nth-child(even) td{background:rgba(255,255,255,.02)}

.note{background:linear-gradient(90deg,rgba(255,207,92,.12),transparent);border-left:4px solid var(--warn);
  padding:14px 18px;border-radius:0 12px 12px 0;font-size:16px}
.danger{background:linear-gradient(90deg,rgba(255,107,122,.14),transparent);border-left:4px solid var(--danger);
  padding:14px 18px;border-radius:0 12px 12px 0;font-size:16px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:center}

/* ===== 상단 진행바 ===== */
#progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
  width:0;z-index:80;transition:width .35s ease;box-shadow:0 0 12px rgba(66,230,200,.6)}

/* ===== 하단 컨트롤바 ===== */
#dock{position:fixed;left:0;right:0;bottom:0;height:64px;z-index:70;
  display:flex;align-items:center;gap:14px;padding:0 22px;
  background:linear-gradient(0deg,rgba(8,12,28,.96),rgba(8,12,28,.7));border-top:1px solid #1e2b57;backdrop-filter:blur(8px)}
#dock button{background:#18234f;border:1px solid #2c3d78;color:var(--txt);border-radius:10px;
  padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
#dock button:hover{background:#22316b;border-color:var(--accent2)}
#dock .brand{font-weight:800;font-size:14px;color:var(--muted);margin-right:auto;display:flex;gap:10px;align-items:center}
#dock .brand b{color:var(--accent)}
#counter{font-variant-numeric:tabular-nums;font-weight:800;color:var(--accent);min-width:60px;text-align:center}
.spd{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.spd input[type=range]{width:120px;accent-color:var(--accent)}
.spd b{color:var(--accent);min-width:34px;text-align:right}

/* ===== 사이드 목차 ===== */
#tocBtn{}
#toc{position:fixed;top:0;left:0;bottom:0;width:360px;z-index:90;background:#0c1330;border-right:1px solid #26366e;
  transform:translateX(-105%);transition:transform .35s cubic-bezier(.22,1,.36,1);padding:26px 20px;overflow:auto;box-shadow:var(--shadow)}
#toc.open{transform:none}
#toc h3{color:var(--accent);font-size:15px;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
#toc .ch{font-weight:800;font-size:16px;margin:16px 0 6px;color:#fff}
#toc a{display:block;color:#b9c4ee;text-decoration:none;font-size:14.5px;padding:7px 10px;border-radius:8px;cursor:pointer}
#toc a:hover{background:#18265a;background:#17224d;color:#fff}
#toc a.cur{background:#1c2b5e;color:var(--accent)}
#scrim{position:fixed;inset:0;background:rgba(4,7,18,.5);z-index:85;opacity:0;visibility:hidden;transition:.3s}
#scrim.on{opacity:1;visibility:visible}

.hint{position:fixed;bottom:76px;right:20px;font-size:12.5px;color:#6f7fb5;z-index:70}
.badge{display:inline-block;background:#1c2b5e;border:1px solid #2c4088;color:var(--accent);
  font-size:12px;font-weight:800;padding:3px 9px;border-radius:6px;margin-left:8px}
.center{display:flex;flex-direction:column;justify-content:center;height:100%}
.muted{color:var(--muted)}
.small{font-size:14.5px}
.kv{display:flex;gap:10px;font-size:16px;padding:8px 0;border-bottom:1px dashed #26366e}
.kv b{color:var(--accent);min-width:120px}
@media (max-width:1100px){.slide h1{font-size:44px}.g4{grid-template-columns:1fr 1fr}}

/* =========================================================
   VIBE-EDU1 THEME OVERRIDE — 테라코타/크림/다크브라운 워밍 테마
   (APPTUBER STUDIO 디자인 시스템 반영)
   ========================================================= */
:root{
  --accent:#C15F3C;     /* 테라코타 */
  --accent2:#D98A5E;    /* 밝은 테라코타 */
  --accent3:#A6482A;    /* 진한 테라코타 */
  --txt:#2b211a; --muted:#7a6a5b;
  --warn:#B8791F; --danger:#C1502F; --ok:#5f7d43;
  --cream:#F3ECE0; --cream2:#EFE6D6; --cardbg:#FBF8F1; --cline:#E6D9C5;
  --dark:#17100b; --darktxt:#F0E7D8;
  --shadow:0 18px 46px rgba(45,25,10,.16);
}
body{ background:var(--dark); color:var(--txt);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,-apple-system,sans-serif; }

/* 슬라이드: 기본은 크림(본문), .cover는 다크 브라운 */
.slide{ background:var(--cream); color:var(--txt); padding:94px 72px 96px; }
.slide.cover{ color:var(--darktxt);
  background:radial-gradient(1150px 720px at 78% -10%, rgba(193,95,60,.30), transparent 60%),
            radial-gradient(900px 620px at 6% 120%, rgba(166,72,42,.20), transparent 55%),
            linear-gradient(160deg,#1d130c,#140d08); }

.slide h1{ color:var(--darktxt); font-weight:900; letter-spacing:-2px; font-size:74px; }
.slide h2{ color:#2b211a; font-weight:900; }
.slide h3{ color:var(--accent3); }
.slide p{ color:#4a3d31; }
.lead{ color:#6a5b4c; }
.slide.cover .lead{ color:#d6c6b0; }
.slide.cover p{ color:#d6c6b0; }

.slidehead{ border-bottom:1px solid #e2d5c0; }
.slidehead .cnum{ background:var(--cream2); color:var(--accent3); }

.card{ background:var(--cardbg); border:1px solid var(--cline); box-shadow:var(--shadow); }
.card h4{ color:#2b211a; }
.card p,.card li{ color:#5a4c3f; }
.card .ico{ background:linear-gradient(135deg,#C15F3C,#D98A5E); color:#fff; }
ul.clean li{ color:#5a4c3f; }
ul.clean li::before{ color:var(--accent); }

.pill{ background:var(--cream2); color:var(--accent3); border:1px solid #e2cfb2; }
.tag-front{ background:#efe0d5; color:#a6532f; border-color:#e6c9b0; }
.tag-back{ background:#e4ecda; color:#5f7d43; border-color:#cfe0bf; }

.term{ color:var(--accent3); border-bottom:2px dotted rgba(193,95,60,.55); }
.term:hover{ color:#7a2f16; background:rgba(193,95,60,.12); }
.term .tip{ background:#241a12; border:1px solid var(--accent); color:#f2e9db; box-shadow:0 18px 40px rgba(20,10,4,.5); }
.term .tip b{ color:var(--accent2); }
.term .tip::after{ border-top-color:var(--accent); }
.slide.cover .term{ color:var(--accent2); border-bottom-color:rgba(217,138,94,.6); }

pre{ background:#231910; border:1px solid #3a2a1c; color:#f0e4d2; }
code.k{color:#e79a6a}code.s{color:#a6c47f}code.c{color:#a8927d}code.n{color:#e0b25c}

.bar-track{ background:#E7DAC6; border:1px solid #dcc9ad; }
.bar-fill{ background:linear-gradient(90deg,#C15F3C,#D98A5E)!important; }
.bar-val{ color:var(--accent3); }
.bar-label{ color:#4a3d31; }

.node{ background:var(--cardbg)!important; border:1px solid var(--cline); }
.node .t{ color:#2b211a; } .node .d{ color:#7a6a5b; }
.arrow{ color:var(--accent); }
.life{ background:var(--cardbg); border:1px solid var(--cline); }
.life .m{ color:var(--accent3); } .life .x{ color:#5a4c3f; }

table.cmp th{ background:var(--cream2); color:var(--accent3); }
table.cmp th,table.cmp td{ border:1px solid #e2d5c0; }
table.cmp td{ color:#4a3d31; }
table.cmp tr:nth-child(even) td{ background:rgba(90,50,20,.035); }

.note{ background:linear-gradient(90deg,rgba(184,121,31,.15),transparent); border-left:4px solid var(--warn); color:#4a3d31; }
.danger{ background:linear-gradient(90deg,rgba(193,80,47,.15),transparent); border-left:4px solid var(--danger); color:#4a3d31; }
.kv{ border-bottom:1px dashed #e2d5c0; } .kv b{ color:var(--accent3); }
.muted{ color:#7a6a5b; } .badge{ background:var(--cream2); color:var(--accent3); border:1px solid #e2cfb2; }

/* 기기 목업은 다크 유지(따뜻하게) */
.phone{ background:#160f09; border:6px solid #3a2a1c; }
.phone .status{ background:#231910; color:#a8927d; }
.drawer{ background:#160f09; border-right:1px solid #3a2a1c; }
.drawer .di{ color:#e6d9c5; border-bottom:1px solid #2a1e14; }
.drawer div[style]{ color:var(--accent2)!important; }

/* 하단 도크 */
#dock{ background:linear-gradient(0deg,rgba(23,16,11,.97),rgba(23,16,11,.82)); border-top:1px solid #3a2a1c; }
#dock button{ background:#2a1e14; border:1px solid #43301f; color:#f0e7d8; }
#dock button:hover{ background:#3a2a1c; border-color:var(--accent); }
#dock .brand{ color:#b09a86; } #dock .brand b{ color:var(--accent2); }
#counter{ color:var(--accent2); } .spd{ color:#b09a86; } .spd b{ color:var(--accent2); }
.spd input[type=range]{ accent-color:var(--accent); }
#progress{ background:linear-gradient(90deg,#C15F3C,#D98A5E,#B8791F); box-shadow:0 0 12px rgba(193,95,60,.6); }

/* 목차 사이드바 */
#toc{ background:#1c140d; border-right:1px solid #3a2a1c; }
#toc h3{ color:var(--accent2); } #toc .ch{ color:#f0e7d8; } #toc a{ color:#c9b9a6; }
#toc a:hover{ background:#2a1e14; color:#fff; } #toc a.cur{ background:#3a2a1c; color:var(--accent2); }
.hint{ color:#8a7a68; }

/* ===== 브랜드 바 / 챕터 번호 / 푸터 (모든 페이지 공통 아이콘) ===== */
.brandbar{ position:absolute; top:38px; left:64px; display:flex; align-items:center; gap:13px; z-index:6; }
.brandbar .spark{ width:30px; height:30px; display:block; flex:none; }
.brandbar .spark svg{ width:100%; height:100%; display:block; }
.brandbar .wm{ font-size:14px; font-weight:800; letter-spacing:4px; color:#9a8064; }
.slide.cover .brandbar .wm{ color:#c9b49a; }
.slidefoot{ position:absolute; right:64px; bottom:36px; font-size:12px; letter-spacing:2.5px;
  font-weight:700; color:#a8927d; z-index:6; text-transform:uppercase; }
.slide.cover .slidefoot{ color:var(--accent2); }
.chapnum{ font-size:150px; font-weight:900; line-height:.86; color:var(--accent);
  letter-spacing:-4px; margin:2px 0 10px; text-shadow:0 8px 30px rgba(193,95,60,.35); }
.slide.cover .kicker{ color:var(--accent2); }
.slide.cover .kicker::before{ background:linear-gradient(90deg,var(--accent2),transparent); }

/* 린 캔버스 / 비즈니스 모델 캔버스 그리드 */

S(3, `<div class="slidehead"><span class="cnum">CH3</span><h2>안드로이드에서는? MVC → MVVM</h2></div>
<div class="body">
<p class="lead">구글이 권장하는 현대 안드로이드 아키텍처는 <b>${T('MVVM','Model-View-ViewModel. ViewModel이 화면 상태를 들고 있고, View는 그 상태를 관찰(observe)만 합니다. 화면 회전에도 데이터 유지.')}</b> 입니다. MVC의 발전형이라 생각하세요.</p>
<table class="cmp" style="margin-top:8px">
  <tr><th>레이어</th><th>MVC</th><th>MVVM (안드로이드 권장)</th></tr>
  <tr><td>화면</td><td>View (Activity/XML)</td><td>View (Compose/Activity)</td></tr>
  <tr><td>중재</td><td>Controller</td><td>${T('ViewModel','화면이 보여줄 데이터(상태)를 보관. 화면 회전 등 생명주기 변화에도 살아남아 데이터를 지킵니다.')}</td></tr>
  <tr><td>데이터</td><td>Model</td><td>Model + ${T('Repository','여러 데이터 소스(서버·DB·캐시)를 하나로 묶어 관리하는 창구 역할의 클래스.')}</td></tr>
</table>
<div class="grid g3" style="margin-top:18px">
  <div class="card"><h4>👀 관찰(Observe)</h4><p class="small">View는 ViewModel의 상태를 구독. 데이터가 바뀌면 화면이 자동 갱신됩니다.</p></div>
  <div class="card"><h4>🔄 생명주기 안전</h4><p class="small">화면 회전으로 Activity가 재생성돼도 ViewModel의 데이터는 유지됩니다.</p></div>
  <div class="card"><h4>🧪 테스트 용이</h4><p class="small">ViewModel은 화면과 분리돼 있어 단위 테스트가 쉽습니다.</p></div>
</div>
</div>`);

S(4, `<div class="slidehead"><span class="cnum">CH4</span><h2>리스트(RecyclerView·LazyColumn)와 목업 데이터</h2></div>
<div class="body">
<div class="two" style="align-items:start">
  <div>
    <h3 style="margin-top:0">📜 긴 목록을 효율적으로 — 리스트</h3>
    <ul class="clean">
      <li><b>${T('RecyclerView','전통 방식의 리스트 컴포넌트. 화면에 보이는 항목만 그리고, 스크롤하면 화면 밖 뷰를 재활용(recycle)해 메모리를 아낍니다.')}</b>(전통) / <b>${T('LazyColumn','Compose의 리스트. 보이는 항목만 지연 생성(lazy)해서 그립니다. RecyclerView의 최신판.')}</b>(Compose)</li>
      <li><b>뷰 재활용</b> — 데이터가 1만 개여도 <b>화면에 보이는 ~10개만</b> 실제로 그리고, 스크롤하면 그 틀을 재사용</li>
      <li><b>${T('페이징 Paging','긴 데이터를 한 번에 다 불러오지 않고 페이지 단위로 조금씩 불러와 이어붙이는 방식. 무한 스크롤의 원리.')}</b> — 한 번에 다 X, <b>조금씩 불러와</b> 이어붙임(무한 스크롤)</li>
      <li>불러온 페이지는 <b>캐시에 저장</b> → 다시 스크롤해도 빠름</li>

  </div>
  <div>
    <h3 style="margin-top:0">🧪 목업 데이터(Mock Data)</h3>
    <p class="small"><b>${T('목업 데이터','Mock Data. 진짜 데이터·서버가 준비되기 전에 쓰는 가짜 임시 데이터. UI를 먼저 만들어 보고 다양한 상태를 테스트하는 용도.')}</b> = 서버가 없어도 화면을 먼저 만들어보는 <b>가짜 임시 데이터</b>입니다.</p>

S(4, `<div class="slidehead"><span class="cnum">CH4</span><h2>Jetpack Compose — 코드로 그리는 UI</h2></div>
<div class="body">
<div class="two">
  <div>
    <p><b>${T('Jetpack Compose','안드로이드 최신 UI 툴킷. XML 없이 Kotlin 함수로 화면을 선언합니다. 구글이 신규 앱에 권장.')}</b> 는 화면을 <b>선언형(Declarative)</b>으로 만듭니다.
    "어떻게 그릴지"가 아니라 "무엇을 보여줄지"만 적으면 됩니다.</p>
    <ul class="clean" style="margin-top:14px">
      <li>${T('선언형 UI','상태(state)를 주면 프레임워크가 화면을 알아서 그리고, 상태가 바뀌면 자동으로 다시 그리는 방식.')} — 상태가 바뀌면 화면 자동 갱신(${T('Recomposition','Compose에서 상태 변화에 따라 UI를 다시 그리는 과정.')})</li>
      <li>XML 레이아웃 파일 불필요</li>
      <li>미리보기(${T('@Preview','코드를 실행하지 않고 안드로이드 스튜디오에서 UI를 바로 확인하는 기능.')})로 즉시 확인</li>
      <li>재사용 가능한 ${T('Composable','@Composable이 붙은 UI 함수. 레고 블록처럼 조합해 화면을 만듭니다.')} 함수로 조립</li>
    </ul>
  </div>
  <pre><code class="c">// 버튼 하나를 그리는 Compose 코드</code>
<code class="k">@Composable</code>
fun Greeting() {
  <code class="k">var</code> count <code class="k">by</code> remember { mutableStateOf(<code class="n">0</code>) }
  Button(onClick = { count++ }) {
    Text(<code class="s">"눌린 횟수: </code>$count<code class="s">"</code>)
  }
  <code class="c">// count가 바뀌면 화면이 자동으로 다시 그려짐</code>
}</pre>
</div>
<div class="note">전통 방식(XML+findViewById)과 비교하면 코드가 짧고, 상태 관리가 명확합니다. 심화 단계에서 반드시 익혀둘 기술.</div>
</div>`);

S(4, `<div class="slidehead"><span class="cnum">CH4</span><h2>머티리얼 디자인 & Compose 디자인</h2></div>
<div class="body">
<p class="lead">둘은 <b>짝</b>입니다. <b>${T('머티리얼 디자인','Material Design. 구글의 공식 디자인 규칙(색·간격·그림자·모션·컴포넌트). 앱이 안드로이드답게 보이고 일관되게 동작하도록 돕는 가이드.')}</b>은 "어떻게 보일지 규칙", <b>Compose</b>는 "그 규칙을 코드로 그리는 도구"입니다.</p>
<div class="grid g2" style="margin-top:6px">
  <div class="card">
    <h4><span class="ico">🎨</span>머티리얼 디자인 (규칙)</h4>
    <ul class="clean">
      <li>구글의 통일 디자인 언어 — 색·타이포·간격·그림자·모션</li>
      <li>버전: Material 1 → 2 → <b>${T('Material 3','Material You라고도 부르는 최신 머티리얼. 사용자 벽지 색으로 앱 테마가 물드는 다이나믹 컬러가 특징.')}</b> (현재)</li>
      <li>${T('다이나믹 컬러','Android 12+에서 사용자 배경화면 색을 뽑아 앱 테마 색으로 자동 적용하는 기능.')} — 사용자 취향 반영</li>
      <li>Button·Card·Scaffold 등 표준 컴포넌트 규격</li>
    </ul>
  </div>
  <div class="card">
    <h4><span class="ico">🧩</span>Compose 디자인 (구현)</h4>
    <ul class="clean">
      <li>Material 3를 <b>기본 지원</b>하는 최신 UI 툴킷</li>
      <li>${T('MaterialTheme','Compose에서 앱 전체의 색·글꼴·모양을 한곳에서 정의하는 테마. 다크모드도 여기서 분기.')}로 색·글꼴·모양을 한 번에 관리</li>
      <li>미리 만든 컴포넌트를 함수로 조립 → 빠른 개발</li>
      <li>다크모드·다이나믹 컬러가 테마에 내장</li>
    </ul>
  </div>
</div>
<pre style="margin-top:14px;font-size:13px"><code class="c">// Material 3 테마 + 표준 버튼 (Compose)</code>
MaterialTheme(colorScheme = dynamicColorScheme(context)) {
  Button(onClick = { }) { Text(<code class="s">"확인"</code>) }   <code class="c">// 머티리얼 규격 버튼</code>
}</pre>
</div>`);

S(4, `<div class="slidehead"><span class="cnum">CH4</span><h2>사용자 알림 — Notification · Toast · Snackbar · Dialog</h2></div>
<div class="body">
<p class="lead">"사용자에게 무언가 알려주는" 방법은 여러 가지입니다. <b>어디에·얼마나 강하게</b> 알릴지에 따라 골라 씁니다.</p>
<div class="grid g4" style="margin-top:8px">
  <div class="card"><h4><span class="ico">🔔</span>${T('Notification','알림. 앱 밖(상단 상태바·알림창·잠금화면)에 뜨는 메시지. 앱이 꺼져 있어도 표시됩니다. 카톡 알림이 대표적.')}</h4>
    <p class="small">앱 <b>밖</b> 상태바/잠금화면. 앱이 닫혀 있어도 뜸. 안드로이드 13+는 ${T('POST_NOTIFICATIONS','안드로이드 13(API33)부터 알림을 보내려면 사용자에게 받아야 하는 권한.')} 권한 필요.</p></div>
  <div class="card"><h4><span class="ico">🍞</span>${T('Toast','토스트. 화면 하단에 잠깐 떴다 사라지는 작은 앱 팝업 메시지. 버튼 없음. "복사되었습니다" 같은 짧은 안내.')}</h4>
    <p class="small">앱 <b>안</b>에 잠깐 뜨는 작은 팝업. 버튼 없이 <b>몇 초 후 자동으로</b> 사라짐. 간단 안내용.</p></div>
  <div class="card"><h4><span class="ico">↩️</span>${T('Snackbar','스낵바. 토스트와 비슷하지만 [실행취소] 같은 액션 버튼을 넣을 수 있는 하단 알림. Material 컴포넌트.')}</h4>
    <p class="small">토스트 + <b>액션 버튼</b>. "삭제됨 · [실행취소]" 처럼 되돌릴 여지를 줄 때.</p></div>
  <div class="card"><h4><span class="ico">🪟</span>${T('Dialog','다이얼로그. 화면 가운데 뜨는 팝업창. 사용자의 확인/선택을 강제로 받을 때. "정말 삭제할까요?".')}</h4>
    <p class="small">화면을 막고 <b>선택을 강제</b>. "정말 삭제하시겠어요? [예/아니오]".</p></div>
</div>
<div class="two" style="margin-top:18px">
  <div>
    <pre style="font-size:14px"><code class="c">// 토스트 — 가장 간단한 팝업 알림</code>
Toast.makeText(context, <code class="s">"저장되었습니다"</code>, Toast.LENGTH_SHORT).show()

<code class="c">// 스낵바 — 실행취소 버튼 포함</code>
Snackbar.make(view, <code class="s">"삭제됨"</code>, Snackbar.LENGTH_LONG)
    .setAction(<code class="s">"실행취소"</code>) { 되돌리기() }.show()</pre>
  </div>
  <div class="note">👉 선택 기준: <b>앱 밖에서도</b> 알려야 하면 Notification, <b>앱 안 짧은 안내</b>는 Toast, <b>되돌릴 액션</b>이 있으면 Snackbar, <b>꼭 답을 받아야</b> 하면 Dialog. 오른쪽 아래 폰 데모의 ＋ 버튼도 이런 피드백의 예입니다.</div>
</div>
</div>`);

S(5, `<div class="slidehead"><span class="cnum">CH5</span><h2>Gradle — 소스코드를 앱으로 만드는 빌드 시스템</h2></div>
<div class="body">
<p class="lead"><b>${T('Gradle','안드로이드 공식 빌드 자동화 도구. 소스코드·리소스·라이브러리를 모아 설치 파일(APK/AAB)로 만들고, 의존성과 버전을 관리합니다.')}</b> 는 우리가 쓴 코드를 실제 설치 파일로 <b>조립·포장</b>하는 공장입니다. Run(▶) 버튼을 누르면 뒤에서 Gradle이 돌아갑니다.</p>
<div class="flow animate" style="margin:14px 0">
  <div class="node"><div class="t">📝 소스·리소스</div></div><div class="arrow">→</div>
  <div class="node"><div class="t">⚙️ 컴파일</div><div class="d">Kotlin/Java→바이트코드</div></div><div class="arrow">→</div>
  <div class="node"><div class="t">📦 ${T('DEX','Dalvik EXecutable. 안드로이드가 실행하는 바이트코드 형식. 컴파일 결과를 DEX로 변환해 앱에 담습니다.')} 변환·패키징</div></div><div class="arrow">→</div>
  <div class="node"><div class="t">🔏 서명 → ${T('APK','설치 파일. 기기에 바로 설치됩니다.')}/${T('AAB','Android App Bundle. 구글 플레이 업로드용 포맷. 기기별로 최적화된 APK를 플레이가 대신 생성.')}</div></div>
</div>
<div class="two">
  <div class="card">
    <h4>build.gradle 은 두 개</h4>
    <ul class="clean">
      <li><b>프로젝트 수준</b> — 전체 공통 설정</li>
      <li><b>모듈(app) 수준</b> — SDK 버전, ${T('의존성','dependency. 앱이 가져다 쓰는 외부 라이브러리. dependencies 블록에 한 줄 추가하면 Gradle이 자동으로 내려받습니다.')}</li>
    </ul>
  </div>
  <pre style="font-size:13px"><code class="c">// 모듈 build.gradle — 라이브러리 추가</code>
dependencies {
  implementation(<code class="s">"androidx.core:core-ktx:1.13.1"</code>)
  implementation(<code class="s">"io.coil-kt:coil:2.6.0"</code>) <code class="c">// 이미지 로딩</code>
}</pre>
</div>
<div class="note">📌 <b>Groovy vs Kotlin DSL</b> = 빌드 스크립트를 쓰는 <b>언어 선택</b>입니다. 전통적 <code class="mono small">build.gradle</code>(${T('Groovy','JVM에서 도는 스크립트 언어. Java와 문법이 비슷하지만 Java는 아닙니다. 전통적 Gradle 빌드 스크립트 언어.')}) vs 최신 <code class="mono small">build.gradle.kts</code>(${T('Kotlin DSL','코틀린 문법으로 빌드 설정을 작성하는 방식. 자동완성이 잘 돼 최근 권장.')}). <b>앱 코드 언어(Kotlin/Java)와는 별개!</b> 설정을 바꾸면 <b>Gradle Sync</b>로 동기화합니다.</div>
</div>`);

S(5, `<div class="slidehead"><span class="cnum">CH5</span><h2>디버깅 필수 용어 정리</h2></div>
<div class="body">
<p class="lead">버그를 잡으려면 먼저 <b>말이 통해야</b> 합니다. 실무에서 매일 쓰는 디버깅 용어를 정리합니다.</p>
<div class="grid g3" style="margin-top:6px">
  <div class="card"><h4><span class="ico">🐞</span>${T('버그 / 디버깅','버그=프로그램 오류. 디버깅=그 오류의 원인을 찾아 고치는 과정.')}</h4><p class="small">오류를 찾아 고치는 전 과정.</p></div>
  <div class="card"><h4><span class="ico">📋</span>${T('Logcat','안드로이드의 로그 창. 앱이 남긴 메시지와 에러가 실시간으로 흐릅니다. 디버깅의 출발점.')}</h4><p class="small">기기가 뿜는 로그를 실시간으로 보는 창.</p></div>
  <div class="card"><h4><span class="ico">✍️</span>${T('Log.d / Log.e','코드에 직접 심는 로그 출력. Log.d(디버그)·Log.e(에러)·Log.i(정보)·Log.w(경고). 흐름과 값 확인용.')}</h4><p class="small">코드에 심어 값·흐름을 찍는 로그 함수.</p></div>
  <div class="card"><h4><span class="ico">⛔</span>${T('중단점 Breakpoint','코드 특정 줄에 걸어 실행을 멈추는 표시. 그 순간의 변수 값을 들여다볼 수 있습니다.')}</h4><p class="small">실행을 멈추고 상태를 들여다보는 지점.</p></div>
  <div class="card"><h4><span class="ico">👣</span>${T('Step Over / Into','디버거로 코드를 한 줄씩 실행. Over=함수를 통째로 넘김, Into=함수 안으로 들어감.')}</h4><p class="small">한 줄씩 실행하며 추적.</p></div>
  <div class="card"><h4><span class="ico">📉</span>${T('Stack Trace','에러가 난 순간까지 함수가 호출된 경로 기록. 어디서·왜 터졌는지 알려주는 지도.')}</h4><p class="small">에러가 터지기까지의 호출 경로.</p></div>
  <div class="card"><h4><span class="ico">💥</span>${T('Exception / Crash','Exception=실행 중 발생한 예외 상황. 처리 못 하면 앱이 강제 종료(Crash)됩니다.')}</h4><p class="small">예외 발생 → 처리 못 하면 앱 강제종료.</p></div>
  <div class="card"><h4><span class="ico">🚫</span>${T('NullPointerException (NPE)','값이 없는(null) 것을 사용하려다 나는 대표적 오류. Kotlin의 널 안전 기능으로 예방.')}</h4><p class="small">가장 흔한 크래시 — "값이 없는데 썼다".</p></div>
  <div class="card"><h4><span class="ico">📊</span>${T('Profiler','앱의 CPU·메모리·네트워크 사용량을 실시간 그래프로 보는 도구. 성능 문제·메모리 누수 추적.')}</h4><p class="small">성능·메모리·네트워크 실시간 측정.</p></div>
  <div class="card"><h4><span class="ico">🧊</span>${T('ANR','Application Not Responding. 앱이 5초 이상 멈춰 "응답 없음" 뜨는 상태. 무거운 작업을 메인 스레드에서 하면 발생.')}</h4><p class="small">앱이 멈춰 "응답 없음" 뜨는 현상.</p></div>
  <div class="card"><h4><span class="ico">🧵</span>${T('메인 스레드','화면(UI)을 그리는 주 실행 흐름. 여기서 무거운 작업(네트워크·DB)을 하면 앱이 버벅이거나 ANR 발생.')}</h4><p class="small">UI 담당 흐름 — 무거운 일은 여기서 X.</p></div>
  <div class="card"><h4><span class="ico">🔁</span>${T('Clean & Rebuild','빌드 결과물을 지우고 처음부터 다시 빌드. 원인 모를 이상 동작 시 1순위 해결책.')}</h4><p class="small">원인 불명 오류 땐 지우고 다시 빌드.</p></div>
</div>
<div class="note">🎯 디버깅 공식: <b>재현 → Logcat/Stack Trace 확인 → 중단점으로 좁히기 → 수정 → 재검증</b>. "감으로 고치기" 대신 이 순서를 습관화하세요.</div>
</div>`);

S(6, `<div class="slidehead"><span class="cnum">CH6</span><h2>어디에 저장할까? 저장 방식 비교</h2></div>
<div class="body">

  <div class="bar-row"><div class="bar-label">${T('SharedPreferences','키-값(key-value) 형태로 작은 설정값을 저장하는 안드로이드 기본 저장소. 로그인 여부, 다크모드 on/off 등.')}</div><div class="bar-track"><div class="bar-fill" style="--w:18%;background:linear-gradient(90deg,#6c8cff,#42e6c8)"></div></div><div class="bar-val">작음</div></div>

S(6, `<div class="slidehead"><span class="cnum">CH6</span><h2>SharedPreferences & DAO 저장 패턴</h2></div>
<div class="body">
<div class="two">
  <div>
    <h3 style="margin-top:0">SharedPreferences (키-값)</h3>
    <pre><code class="c">// 저장</code>
<code class="k">val</code> prefs = getSharedPreferences(<code class="s">"my"</code>, MODE_PRIVATE)
prefs.edit().putString(<code class="s">"name"</code>, <code class="s">"홍길동"</code>).apply()

<code class="c">// 읽기</code>
<code class="k">val</code> name = prefs.getString(<code class="s">"name"</code>, <code class="s">""</code>)</pre>
  </div>
  <div>
    <h3 style="margin-top:0">${T('DAO','Data Access Object. DB에 접근하는 함수(추가·조회·삭제)를 모아둔 인터페이스. Room에서 사용.')} (Room DB)</h3>
    <pre><code class="k">@Dao</code>
<code class="k">interface</code> UserDao {
  <code class="k">@Insert</code>
  <code class="k">suspend fun</code> insert(user: User)

  <code class="k">@Query</code>(<code class="s">"SELECT * FROM User"</code>)
  <code class="k">suspend fun</code> getAll(): List&lt;User&gt;
}</pre>
  </div>
</div>
<div class="note">💡 <b>DAO</b>는 "데이터에 접근하는 창구"입니다. 화면 코드는 SQL을 몰라도 <code class="mono">insert()</code>·<code class="mono">getAll()</code> 만 호출하면 됩니다 — MVC의 Model 분리 원칙과 같은 맥락.</div>
</div>`);

S(6, `<div class="slidehead"><span class="cnum">CH6</span><h2>데이터가 잘 저장됐는지 확인하기</h2></div>

  <div class="card"><h4><span class="ico">📋</span>Logcat 출력</h4><p class="small">저장 직후 <code class="mono small">Log.d("SAVE", name)</code> 로 값을 찍어 흐름을 추적.</p></div>

</div>
</div>`);

S(6, `<div class="slidehead"><span class="cnum">CH6</span><h2>⚠️ 개인정보 보호 — 가장 중요한 이슈</h2></div>
<div class="body">
<div class="danger">개인정보는 <b>법적 책임</b>이 따르는 영역입니다. 이름·연락처·위치·사진 등을 다룬다면 반드시 아래 원칙을 지키세요.</div>
<div class="grid g2" style="margin-top:16px">
  <div class="card"><h4><span class="ico">🔐</span>최소 수집 원칙</h4><p class="small">꼭 필요한 정보만 받습니다. 안 쓰는 정보는 아예 수집하지 않기.</p></div>
  <div class="card"><h4><span class="ico">🛡️</span>암호화 저장</h4><p class="small">비밀번호·토큰은 평문 금지. ${T('EncryptedSharedPreferences','값을 암호화해서 저장하는 안드로이드 보안 저장소. 민감 정보에 사용.')} / Keystore 사용.</p></div>
  <div class="card"><h4><span class="ico">📜</span>권한 최소화 + 고지</h4><p class="small">${T('런타임 권한','카메라·위치 등 민감 권한은 앱 실행 중 사용자에게 팝업으로 물어보고 받아야 합니다.')} 을 필요한 순간에만 요청하고 이유를 설명.</p></div>
  <div class="card"><h4><span class="ico">📄</span>개인정보처리방침</h4><p class="small">${T('개인정보처리방침','앱이 어떤 정보를 왜 수집·보관·이용하는지 밝힌 문서. 스토어 등록 시 필수.')} 필수. 스토어 심사·법규(GDPR·국내법) 준수.</p></div>
  <div class="card"><h4><span class="ico">🌐</span>전송 구간 보호</h4><p class="small">서버 통신은 반드시 ${T('HTTPS','통신을 암호화하는 보안 프로토콜. http에 s(security)가 붙은 것. 도청·변조 방지.')}. 평문 http 금지.</p></div>
  <div class="card"><h4><span class="ico">🗑️</span>파기·탈퇴 처리</h4><p class="small">사용자가 탈퇴하면 데이터를 실제로 삭제. 보관 기간을 정해 관리.</p></div>
</div>
</div>`);

S(7, `<div class="slidehead"><span class="cnum">CH7</span><h2>버전 히스토리 — 디저트 이름의 시대</h2></div>

S(7, `<div class="slidehead"><span class="cnum">CH7</span><h2>Android 17 (API 37) — 2026.6.16 정식 출시</h2></div>
<div class="body">
<p class="lead">현재 최신 정식 버전. 핵심 방향은 <b>적응형(대형 화면) · Compose 우선 · 온디바이스 AI · 성능</b>입니다.</p>
<div class="grid g3" style="margin-top:4px">
  <div class="card"><h4><span class="ico">📐</span>대형 화면 적응 '의무'</h4><p class="small">API 37 타깃 앱은 <b>600dp 이상</b> 화면에서 방향 고정·리사이즈 거부 불가. 폴더블·태블릿 대응이 선택이 아닌 필수로.</p></div>
  <div class="card"><h4><span class="ico">🫧</span>App Bubbles · Bubble Bar</h4><p class="small">앱을 <b>떠 있는 버블</b>로 전환하고, 태블릿·폴더블에서 Bubble Bar로 관리.</p></div>
  <div class="card"><h4><span class="ico">🧩</span>Compose 우선(Compose-first)</h4><p class="small">"Android is Compose-first" 공식 선언. 기존 <b>View 기반은 유지보수 모드</b>로.</p></div>
  <div class="card"><h4><span class="ico">🤖</span>온디바이스 AI</h4><p class="small">Gemini 등 <b>온디바이스 AI 에이전트</b>와 앱 기능 연동(제한적 프리뷰).</p></div>
  <div class="card"><h4><span class="ico">⚡</span>성능</h4><p class="small">${T('락프리 MessageQueue','메인 스레드 메시지 처리에서 잠금을 제거해 프레임 드롭을 줄인 구조.')} · 세대별 GC로 프레임 드롭 감소.</p></div>
  <div class="card"><h4><span class="ico">🔐</span>개인정보·보안</h4><p class="small">임시 연락처 선택기, ${T('EyeDropper API','스크린 캡처 권한 없이 화면 색을 추출하는 안전한 색 선택 API.')}, SMS OTP 3시간 지연, cleartext 차단 강화.</p></div>
</div>
<div class="note" style="margin-top:14px">📖 공식 출처: <a class="link" href="https://android-developers.googleblog.com/2026/06/Android-17.html" target="_blank" rel="noopener">Android 17 출시 블로그</a> · <a class="link" href="https://developer.android.com/about/versions/17" target="_blank" rel="noopener">developer.android.com/about/versions/17</a></div>
</div>`);

S(7, `<div class="slidehead"><span class="cnum">CH7</span><h2>minSdk · targetSdk · compileSdk</h2></div>
<div class="body">
<div class="grid g3">
  <div class="card"><h4>📉 minSdk</h4><p class="small">앱이 <b>돌아가는 최소</b> 버전. 낮출수록 많은 기기 지원(예: 24=안드로이드 7). 너무 낮으면 코드가 복잡.</p></div>
  <div class="card"><h4>🎯 targetSdk</h4><p class="small">앱이 <b>겨냥한 최신</b> 버전. 이 버전 기준으로 동작·정책이 적용됩니다.</p></div>
  <div class="card"><h4>🧱 compileSdk</h4><p class="small">앱을 <b>컴파일</b>할 때 쓰는 SDK. 보통 최신으로 맞춥니다.</p></div>
</div>
<div class="danger" style="margin-top:18px">📢 <b>2026년 Google Play 최소 요건</b>은 <b>targetSdk 36(안드로이드 16) 이상</b>입니다(2026-08-31 마감). 다만 최신 플랫폼은 <b>Android 17(API 37)</b>이니, compileSdk·targetSdk는 가능하면 <b>37</b>로 올리는 것을 권장합니다.</div>
<pre style="margin-top:16px"><code class="c">// build.gradle (모듈) — 예시</code>
android {
  compileSdk = <code class="n">37</code>            <code class="c">// 최신 SDK로 컴파일(권장)</code>
  defaultConfig {
    minSdk = <code class="n">24</code>      <code class="c">// 안드로이드 7.0까지 지원</code>
    targetSdk = <code class="n">37</code>   <code class="c">// Play 최소 요건은 36, 37 권장</code>
  }
}</code></pre>
</div>`);

S(8, `<div class="slidehead"><span class="cnum">CH8</span><h2>HTTP 방식 — GET vs POST</h2></div>
<div class="body">
<div class="chart" style="max-width:820px;margin-bottom:8px">
  <div style="font-weight:800;margin-bottom:6px">언제 무엇을 쓰나 (사용 빈도 개념)</div>
  <div class="bar-row"><div class="bar-label">GET (조회)</div><div class="bar-track"><div class="bar-fill" style="--w:70%;background:linear-gradient(90deg,#6c8cff,#42e6c8)"></div></div><div class="bar-val">조회</div></div>
  <div class="bar-row"><div class="bar-label">POST (전송)</div><div class="bar-track"><div class="bar-fill" style="--w:55%;background:linear-gradient(90deg,#ff7ad9,#ffcf5c)"></div></div><div class="bar-val">생성</div></div>
</div>
<table class="cmp">
  <tr><th>구분</th><th>${T('GET','서버에서 데이터를 가져올 때 쓰는 HTTP 방식. 파라미터가 URL에 보입니다.')} </th><th>${T('POST','서버로 데이터를 보내 저장/처리할 때 쓰는 HTTP 방식. 데이터가 본문(body)에 담겨 URL에 안 보임.')} </th></tr>
  <tr><td>용도</td><td>데이터 <b>조회</b> (목록·검색)</td><td>데이터 <b>전송·생성</b> (로그인·글쓰기)</td></tr>
  <tr><td>데이터 위치</td><td>URL 뒤 (<code class="mono small">?q=값</code>) — <b>보임</b></td><td>본문(body) — <b>안 보임</b></td></tr>
  <tr><td>보안·용량</td><td>노출·길이 제한 있음</td><td>덜 노출·용량 큼</td></tr>
  <tr><td>예</td><td><code class="mono small">GET /users?page=1</code></td><td><code class="mono small">POST /login</code> (아이디·비번)</td></tr>
</table>
<div class="note">🔑 비밀번호·개인정보는 <b>절대 GET으로 URL에 담지 마세요</b>. 반드시 POST + HTTPS. (그 외 PUT=수정, DELETE=삭제도 있습니다.)</div>
</div>`);

S(8, `<div class="slidehead"><span class="cnum">CH8</span><h2>코루틴(Coroutine) — 멈춤 없이 백그라운드 처리</h2></div>
<div class="body">
<div class="two">
  <div>
    <p><b>${T('코루틴','Coroutine. 코틀린의 비동기 처리 방식. 네트워크·DB 같은 오래 걸리는 작업을 메인 스레드를 막지 않고 백그라운드에서 실행해 화면이 멈추지 않게 합니다.')}</b> 은 API 호출·DB 조회처럼 <b>오래 걸리는 작업</b>을 화면을 멈추지 않고 처리하는 코틀린의 방법입니다.</p>
    <ul class="clean" style="margin-top:12px">
      <li>메인 스레드에서 네트워크 → 앱 멈춤·${T('ANR','Application Not Responding. 5초 이상 멈추면 "응답 없음". 무거운 작업을 메인 스레드에서 하면 발생.')}</li>
      <li>코루틴으로 옮기면 화면은 <b>부드럽게</b> 유지</li>
      <li>${T('suspend','일시 중단 함수. 잠시 멈췄다가 결과가 오면 그 자리에서 재개. 코루틴 안에서만 호출됩니다.')} 함수로 "기다렸다 이어가기"</li>
      <li>${T('viewModelScope','ViewModel에 묶인 코루틴 실행 범위. 화면이 사라지면 자동으로 취소돼 메모리 누수를 막습니다.')} — 화면 종료 시 자동 취소</li>
    </ul>
    <div class="note" style="margin-top:12px">${T('Dispatchers','코루틴을 어느 스레드에서 돌릴지 지정. Main=화면 갱신, IO=네트워크·DB, Default=무거운 계산.')}: <b>IO</b>(네트워크·DB) / <b>Main</b>(화면 갱신)으로 역할을 나눕니다.</div>
  </div>
  <pre style="font-size:13px"><code class="c">// ViewModel에서 API 호출 (코루틴)</code>
<code class="k">fun</code> load() {
  viewModelScope.launch {        <code class="c">// 화면 사라지면 자동 취소</code>
    <code class="k">val</code> data = withContext(Dispatchers.IO) {
      api.getUser()              <code class="c">// 백그라운드에서 네트워크</code>
    }
    _user.value = data           <code class="c">// 메인 스레드에서 화면 갱신</code>
  }
}</pre>
</div>
<div class="note">🔗 앞의 GET/POST·결제 같은 네트워크 작업은 <b>거의 항상 코루틴</b> 위에서 돌아갑니다. 3장 MVVM의 ViewModel과 짝으로 쓰는 것이 정석입니다.</div>
</div>`);

S(8, `<div class="slidehead"><span class="cnum">CH8</span><h2>URL 주소창 — 전부 보이기 / 가려 보이기</h2></div>
<div class="body">
<div class="two">
  <div>
    <p>앱 안에서 웹을 띄우거나(${T('WebView','앱 안에 웹페이지를 그대로 띄우는 컴포넌트. 하이브리드 앱에서 자주 사용.')}) ${T('커스텀 탭','앱을 벗어나지 않고 브라우저 화면을 여는 방식. 주소·보안 표시를 유지.')} 을 열 때, 주소창을 어떻게 보여줄지 선택할 수 있습니다.</p>
    <ul class="clean" style="margin-top:12px">
      <li><b>전부 보이기</b> — 사용자가 도메인을 확인 → <b>신뢰·보안</b>에 유리(피싱 방지)</li>

S(8, `<div class="slidehead"><span class="cnum">CH8</span><h2>WebView — 앱 속의 미니 브라우저 (제일 중요!)</h2></div>

S(8, `<div class="slidehead"><span class="cnum">CH8</span><h2>실무 이슈 — 카드 결제와 WebView (PG 결제창)</h2></div>
<div class="body">
<div class="two">
  <div>
    <p>카드 결제는 대부분 <b>${T('PG사','Payment Gateway(결제대행사). 앱과 카드사 사이에서 결제·정산을 대신 처리. 토스페이먼츠·페이플·KG이니시스·NHN KCP·나이스페이먼츠 등.')}</b>가 제공하는 <b>결제창</b>을 앱 안 <b>${T('WebView','앱 안에 웹페이지를 띄우는 화면 컴포넌트. PG사 결제창(웹)을 앱 내부에서 그대로 보여줄 때 사용.')}</b>로 띄워 진행합니다. 앱이 카드번호를 직접 받지 않는 것이 핵심입니다.</p>
    <div class="flow animate" style="flex-direction:column;gap:8px;margin-top:12px">
      <div class="node"><div class="t">📱 우리 앱 (WebView)</div></div>
      <div class="arrow">↓ 결제창 로드</div>
      <div class="node"><div class="t">🌐 PG사 결제창</div><div class="d">토스페이먼츠 · 페이플 등</div></div>
      <div class="arrow">↓ ${T('앱카드','카드사 간편결제 앱(삼성페이·ISP/페이북·신한/현대 앱카드 등). 결제창이 이 앱을 호출해 본인인증합니다.')} 호출</div>
      <div class="node"><div class="t">💳 카드사 앱 → 인증 → 결과 콜백</div></div>
    </div>
  </div>
  <div>
    <div class="danger">⚠️ 핵심 함정: WebView는 <b>http(s)만</b> 이해합니다. 결제창이 카드사 앱을 부르는 <code class="mono small">intent://</code>·<code class="mono small">ISP://</code> 스킴을 만나면 <b>net::ERR_UNKNOWN_URL_SCHEME</b> 에러로 결제가 멈춥니다.</div>
    <pre style="margin-top:12px;font-size:12.5px"><code class="c">// 외부 앱 스킴을 가로채 카드사 앱 실행</code>
webView.webViewClient = <code class="k">object</code> : WebViewClient() {
  <code class="k">override fun</code> shouldOverrideUrlLoading(v, req): Boolean {
    <code class="k">val</code> url = req.url.toString()
    <code class="k">if</code> (!url.startsWith(<code class="s">"http"</code>)) {
      <code class="c">// intent://, ISP://, market:// 등</code>
      startActivity(Intent.parseUri(url, 0))
      <code class="k">return true</code>
    }
    <code class="k">return false</code>
  }
}
webView.settings.javaScriptEnabled = <code class="k">true</code>
webView.settings.domStorageEnabled = <code class="k">true</code></pre>
  </div>
</div>
<div class="note">필수 체크: ① <b>shouldOverrideUrlLoading</b>에서 앱 스킴 처리 ② 카드사 앱 <b>미설치 시 마켓으로</b> 유도 ③ AndroidManifest에 카드사 패키지 <code class="mono small">&lt;queries&gt;</code> 등록(안 하면 설치돼 있어도 스토어로 튐) ④ <b>${T('HTTPS','통신 암호화 프로토콜. 결제는 반드시 https. 카드정보 보호의 최소 조건.')} 필수</b> · 카드정보는 ${T('PCI-DSS','카드 데이터 보안 국제 표준. 카드번호는 앱이 저장·처리하지 않고 PG·카드사가 담당하도록 설계.')} 준수</div>
</div>`);

S(9, `<div class="slidehead"><span class="cnum">CH9</span><h2>안드로이드 뷰 화면 구성</h2></div>
<div class="body">
<div class="flow animate" style="margin:10px 0 18px">
  <div class="node"><div class="t">${T('Activity','하나의 화면. 앱의 각 페이지가 Activity 또는 Fragment로 만들어집니다.')}</div><div class="d">화면 한 장</div></div>
  <div class="arrow">⊃</div>
  <div class="node"><div class="t">${T('Fragment','Activity 안에서 재사용 가능한 화면 조각. 탭 화면 등에 사용.')}</div><div class="d">화면 조각</div></div>
  <div class="arrow">⊃</div>
  <div class="node"><div class="t">${T('View / Composable','버튼·텍스트·이미지 같은 화면 최소 단위. 전통 방식은 View, 최신은 Composable.')}</div><div class="d">버튼·텍스트</div></div>
</div>
<div class="grid g3">
  <div class="card"><h4>🗂️ 화면 계층</h4><p class="small">Activity 안에 여러 View가 트리 구조로 쌓입니다. 부모-자식 관계로 배치.</p></div>
  <div class="card"><h4>📐 레이아웃</h4><p class="small">${T('ConstraintLayout','뷰끼리의 관계(제약)로 위치를 잡는 유연한 레이아웃. 반응형에 강함.')} · LinearLayout 등으로 배치 규칙 정의.</p></div>
  <div class="card"><h4>🧩 Compose</h4><p class="small">최신 방식은 계층을 함수 호출로 표현. Column·Row·Box로 배치.</p></div>
</div>
<div class="note">전통(XML View)과 최신(Compose)이 공존합니다. 신규 프로젝트는 Compose, 기존 유지보수는 View를 만나게 됩니다.</div>
</div>`);

S(9, `<div class="slidehead"><span class="cnum">CH9</span><h2>액티비티 생명주기(Lifecycle)</h2></div>
<div class="body">
<div class="two">
  <div class="cycle animate">
    <div class="life"><span class="m">onCreate()</span><span class="x">화면 생성 — 초기화, 화면 붙이기</span></div>
    <div class="life"><span class="m">onStart()</span><span class="x">화면이 보이기 시작</span></div>
    <div class="life"><span class="m">onResume()</span><span class="x">사용자와 상호작용 시작 (활성)</span></div>
    <div class="life"><span class="m">onPause()</span><span class="x">다른 화면에 가려짐 — 저장 시작</span></div>
    <div class="life"><span class="m">onStop()</span><span class="x">화면이 안 보임 (백그라운드)</span></div>
    <div class="life"><span class="m">onDestroy()</span><span class="x">화면 종료 — 자원 해제</span></div>
  </div>
  <div>
    <p>앱은 켜지고·가려지고·꺼질 때마다 <b>${T('생명주기 Lifecycle','Activity가 생성→활성→정지→소멸로 거치는 단계. 각 단계에서 정해진 함수가 호출됩니다.')}</b> 함수가 순서대로 호출됩니다. 여기서 "무엇을 언제 할지"를 정합니다.</p>
    <ul class="clean" style="margin-top:12px">
      <li><b>onCreate</b> — 딱 한 번, 초기 세팅</li>
      <li><b>onResume/onPause</b> — 오갈 때마다 반복</li>
      <li>전화가 오면? onPause → onResume</li>
      <li>홈 버튼? onStop → (복귀 시) onStart</li>
    </ul>
    <p class="small" style="margin-top:14px">📖 안드로이드 공식 생명주기 문서(클릭 시 바로 이동):<br>
    <a class="link" href="https://developer.android.com/guide/components/activities/activity-lifecycle" target="_blank" rel="noopener">developer.android.com/guide/components/activities/activity-lifecycle</a></p>
  </div>
</div>
</div>`);

S(9, `<div class="slidehead"><span class="cnum">CH9</span><h2>라이프사이클 실무 — 흔한 버그와 대응</h2></div>
<div class="body">
<div class="grid g2">
  <div class="card"><h4><span class="ico">🔄</span>화면 회전 시 데이터 소실</h4><p class="small">회전하면 Activity가 <b>재생성</b>(onDestroy→onCreate)됩니다. 입력값이 사라지죠. → <b>${T('ViewModel','화면 재생성에도 살아남아 데이터를 유지하는 저장소. 회전 대응의 정석.')}</b> 나 저장 콜백으로 상태 보관.</p></div>
  <div class="card"><h4><span class="ico">💾</span>저장은 onPause에서</h4><p class="small">사용자가 화면을 떠날 때 데이터가 날아가지 않게, <b>onPause/onStop</b>에서 저장 처리.</p></div>
  <div class="card"><h4><span class="ico">🔋</span>자원 해제</h4><p class="small">위치·카메라·타이머는 <b>onStop/onDestroy</b>에서 반드시 해제 — 안 하면 배터리·메모리 누수.</p></div>
  <div class="card"><h4><span class="ico">⏯️</span>재개 시 갱신</h4><p class="small">백그라운드 후 돌아왔을 때 최신 데이터가 필요하면 <b>onResume</b>에서 새로고침.</p></div>
</div>
<div class="note" style="margin-top:16px">🎯 정리: "이 코드를 <b>어느 생명주기 함수에 넣을까</b>?"를 늘 생각하는 것 — 이게 초보와 실무의 차이입니다.</div>
</div>`);

slides.forEach((s,i)=>{
  const el = document.createElement('section');
  el.className = 'slide' + (i===0?' active':'');
  if(s.html.includes('class="cover')) el.classList.add('cover');
  el.dataset.idx = i;
  el.innerHTML = s.html;
  // 모든 페이지 좌상단 브랜드 아이콘
  el.insertAdjacentHTML('afterbegin', BRAND);
  // 챕터 표지에는 대형 번호
  const kick = el.querySelector('.kicker');
  if(kick){
    const m = kick.textContent.match(/CHAPTER\s+(\d+)/i);
    if(m){ const num=document.createElement('div'); num.className='chapnum';
      num.textContent = m[1].padStart(2,'0'); kick.insertAdjacentElement('afterend', num);
      const ct = CTX[+m[1]];
      if(ct){ const cover = el.querySelector('.cover') || el;
        cover.insertAdjacentHTML('beforeend',
          `<div class="ctxtip"><span class="ctxlabel">💬 컨텍스트 한 줄 팁</span>${ct}</div>`); }
    }
  }
  // 우하단 푸터 메타
  el.insertAdjacentHTML('beforeend',
    `<div class="slidefoot">${String(i+1).padStart(2,'0')} · ${CH[s.ch]}</div>`);
  stage.appendChild(el);
});
const slideEls = [...document.querySelectorAll('.slide')];

const tocList = document.getElementById('tocList');

    const h = document.createElement('div');
    h.className='ch'; h.textContent = CH[s.ch];
    tocList.appendChild(h); lastCh = s.ch;
  }
  const a = document.createElement('a');
  // 슬라이드 첫 제목 추출
  const tmp=document.createElement('div'); tmp.innerHTML=s.html;
  const title = (tmp.querySelector('h1,h2')?.textContent || ('슬라이드 '+(i+1))).trim();
  a.textContent = (i+1)+'. '+title;

  a.dataset.idx=i;
  tocList.appendChild(a);
});

  cards.forEach((n,k)=> setTimeout(()=>n.classList.add('in'), 150 + k*220));
  const lives = el.querySelectorAll('.cycle .life');
  lives.forEach((n,k)=> setTimeout(()=>n.classList.add('in'), 120 + k*160));
  const bmc = el.querySelectorAll('.bmc-cell');
  bmc.forEach((n,k)=> setTimeout(()=>n.classList.add('in'), 100 + k*120));
  const loop = el.querySelectorAll('.loop .lp, .loop .la');
  loop.forEach((n,k)=> setTimeout(()=>n.classList.add('in'), 120 + k*150));
}
function clearAnims(el){
  el.querySelectorAll('.in').forEach(n=>n.classList.remove('in'));
}

function show(i){
  i = Math.max(0, Math.min(slides.length-1, i));
  slideEls[cur].classList.remove('active');
  clearAnims(slideEls[cur]);
  cur = i;
  const el = slideEls[cur];
  el.classList.add('active');
  el.scrollTop = 0;
  triggerAnims(el);
  document.getElementById('counter').textContent = (i+1)+' / '+slides.length;
  document.getElementById('progress').style.width = ((i+1)/slides.length*100)+'%';
  // 목차 현재 표시
  document.querySelectorAll('#toc a').forEach(a=>a.classList.toggle('cur', +a.dataset.idx===i));
}
function go(d){ show(cur+d); }
function jump(i){ show(i); }
function replay(){ clearAnims(slideEls[cur]); void slideEls[cur].offsetWidth; triggerAnims(slideEls[cur]); }

function setSpeed(v){
  document.documentElement.style.setProperty('--anim-mult', v);
  document.getElementById('spdv').textContent = parseFloat(v).toFixed(1)+'x';
}

// 목차 토글
function toggleToc(){ const t=document.getElementById('toc'); const s=document.getElementById('scrim');
  t.classList.toggle('open'); s.classList.toggle('on'); }
function closeToc(){ document.getElementById('toc').classList.remove('open'); document.getElementById('scrim').classList.remove('on'); }

// 키보드
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') { go(1); e.preventDefault(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp') { go(-1); e.preventDefault(); }
  else if(e.key==='Home') show(0);
  else if(e.key==='End') show(slides.length-1);
  else if(e.key.toLowerCase()==='f'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  else if(e.key==='r'||e.key==='R') replay();
  else if(/^[0-9]$/.test(e.key)){
    // 숫자키 → 해당 챕터 첫 슬라이드
    const chIdx = e.key==='0'?10:+e.key;
    const t = slides.findIndex(s=>s.ch===chIdx);
    if(t>=0) show(t);
  }
});

/* ===== 인터랙티브 데모: 스와이프 카드 ===== */
let sw={active:false,x0:0,dx:0,el:null};
function startSwipe(e){
  const c=document.getElementById('swipeCard');
  sw={active:true,x0:e.clientX,dx:0,el:c};
  c.setPointerCapture(e.pointerId);
  c.style.transition='none';
  c.onpointermove=moveSwipe; c.onpointerup=endSwipe; c.onpointercancel=endSwipe;
}
function moveSwipe(e){ if(!sw.active)return; sw.dx=e.clientX-sw.x0;
  sw.el.style.transform=`translateX(${sw.dx}px) rotate(${sw.dx/20}deg)`;
  sw.el.style.opacity = 1 - Math.min(Math.abs(sw.dx)/200,0.75);
}
function endSwipe(e){
  if(!sw.active)return; sw.active=false;
  const msg=document.getElementById('swipeMsg'); const c=sw.el;
  c.style.transition='transform .3s ease, opacity .3s';
  if(Math.abs(sw.dx)>90){
    const dir=sw.dx>0?1:-1;
    c.style.transform=`translateX(${dir*400}px) rotate(${dir*20}deg)`; c.style.opacity=0;
    msg.textContent = dir>0? '✅ 오른쪽으로 밀어 [보관]됨':'🗑️ 왼쪽으로 밀어 [삭제]됨';
    setTimeout(()=>{ c.style.transition='transform .35s cubic-bezier(.22,1,.36,1),opacity .3s';
      c.style.transform='none'; c.style.opacity=1; }, 700);
  } else {
    c.style.transform='none'; c.style.opacity=1; msg.textContent='↔ 조금 더 세게 밀어보세요';
  }
  c.onpointermove=null;c.onpointerup=null;
}

/* ===== 데모: 햄버거 드로어 / FAB ===== */
function toggleDrawer(){ document.getElementById('drawer').classList.toggle('open'); }
let fabN=0;
function tapFab(){ fabN++; document.getElementById('fabMsg').textContent='＋ 액션 버튼 실행 ('+fabN+'회) — 예: 새 글 작성'; }

// 초기화
show(0);
setSpeed(1);
</script>
