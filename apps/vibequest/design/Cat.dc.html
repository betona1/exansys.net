<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<svg viewBox="0 0 200 216" style="width:100%;height:100%;overflow:visible;display:block;">
  <!-- ears (short + wide = cat, not rabbit) -->
  <path d="M50 98 L38 46 L94 76 Z" fill="{{ coatDark }}"/>
  <path d="M150 98 L162 46 L106 76 Z" fill="{{ coatDark }}"/>
  <path d="M57 90 L49 58 L84 76 Z" fill="{{ inner }}"/>
  <path d="M143 90 L151 58 L116 76 Z" fill="{{ inner }}"/>
  <!-- head -->
  <ellipse cx="100" cy="120" rx="67" ry="60" fill="{{ coat }}"/>
  <!-- muzzle -->
  <ellipse cx="100" cy="143" rx="35" ry="25" fill="{{ muzzle }}" opacity=".55"/>
  <!-- blush -->
  <circle cx="61" cy="136" r="11" fill="#FF9FB5" opacity=".55"/>
  <circle cx="139" cy="136" r="11" fill="#FF9FB5" opacity=".55"/>
  <!-- eyes: green rim + dark pupil + highlight -->
  <ellipse cx="76" cy="118" rx="13" ry="16.5" fill="{{ eye }}"/>
  <ellipse cx="124" cy="118" rx="13" ry="16.5" fill="{{ eye }}"/>
  <ellipse cx="76" cy="120" rx="8.4" ry="12.6" fill="#221B33"/>
  <ellipse cx="124" cy="120" rx="8.4" ry="12.6" fill="#221B33"/>
  <circle cx="79.5" cy="114" r="3.4" fill="#fff"/>
  <circle cx="127.5" cy="114" r="3.4" fill="#fff"/>
  <!-- nose + mouth -->
  <path d="M100 134 l-6 5 h12 z" fill="#F0819A"/>
  <path d="M100 139 q-8 8 -15 2 M100 139 q8 8 15 2" stroke="#5B4A63" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <path d="M39 124 q16 -3 27 2 M37 136 q18 -1 29 4 M161 124 q-16 -3 -27 2 M163 136 q-18 -1 -29 4" stroke="#C3CDDE" stroke-width="2.3" fill="none" stroke-linecap="round" opacity=".85"/>
  <!-- scarf (hidden when scarf prop empty) -->
  <sc-if value="{{ scarf }}" hint-placeholder-val="on">
    <path d="M55 174 q45 27 90 0 l0 13 q-45 25 -90 0 z" fill="{{ scarf }}"/>
    <path d="M121 180 l19 24 -12 4 -12 -20 z" fill="{{ scarf }}"/>
  </sc-if>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:240},&quot;coat&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#8FA0BE&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;coatDark&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#6E80A6&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;inner&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F4C4D0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;eye&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#79DE5A&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;muzzle&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E7ECF5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;scarf&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#12D8A0&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
